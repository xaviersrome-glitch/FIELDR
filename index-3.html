<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FIELDR — Live NBA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{min-height:100vh;background:#07090f;font-family:'Barlow',sans-serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#07090f}
::-webkit-scrollbar-thumb{background:#1e2840;border-radius:3px}
input::placeholder{color:#3a4560}
select option{background:#0f1422}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:fadeUp .18s ease forwards}
.spin{animation:spin .7s linear infinite}
.pulse{animation:pulse 1.4s ease-in-out infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

// ── PARSE / BACK4APP ──────────────────────────────────────────────────────
Parse.initialize("d47uLJzKJJ9BS7UpHfNFBmr3kqARVHwh77BIcuPL","jJsCBy6UZCSdDJNpOumU4xNszGerrMpvYKmraDl4");
Parse.serverURL="https://parseapi.back4app.com/";

// ── BALLDONTLIE API ───────────────────────────────────────────────────────
const BDL_KEY="90de8b56-4920-4e8f-a66f-06b2a11c5b89";
const BDL="https://api.balldontlie.io/v1";
const bdl=async(path,params={})=>{
  const url=new URL(BDL+path);
  Object.entries(params).forEach(([k,v])=>{
    if(Array.isArray(v))v.forEach(x=>url.searchParams.append(k,x));
    else url.searchParams.set(k,String(v));
  });
  const r=await fetch(url.toString(),{headers:{Authorization:BDL_KEY}});
  if(!r.ok)throw new Error(`BDL ${r.status}: ${await r.text()}`);
  return r.json();
};

// ── TOKENS ───────────────────────────────────────────────────────────────
const C={
  bg:"#07090f",s1:"#0b0f1a",s2:"#0f1422",s3:"#131929",
  border:"#1a2236",borderHov:"#2e3d60",
  text:"#c8d4ee",muted:"#3e4e70",dim:"#0d1120",
  accent:"#3d7fff",green:"#1db954",red:"#e8394a",
  orange:"#f5820d",gold:"#f0b429",
};
const F={body:"'Barlow',sans-serif",cond:"'Barlow Condensed',sans-serif"};
const TC={
  ATL:"#E03A3E",BKN:"#AAAAAA",BOS:"#007A33",CHA:"#1D1160",CHI:"#CE1141",
  CLE:"#860038",DAL:"#00538C",DEN:"#0E2240",DET:"#C8102E",GSW:"#1D428A",
  HOU:"#CE1141",IND:"#002D62",LAC:"#C8102E",LAL:"#552583",MEM:"#5D76A9",
  MIA:"#98002E",MIL:"#00471B",MIN:"#236192",NOP:"#0C2340",NYK:"#006BB6",
  OKC:"#007AC1",ORL:"#0077C0",PHI:"#006BB6",PHX:"#1D1160",POR:"#E03A3E",
  SAC:"#5A2D81",SAS:"#C4CED4",TOR:"#CE1141",UTA:"#002B5C",WAS:"#002B5C",
};
const tc=abv=>TC[abv]||"#3d7fff";
const today=()=>new Date().toISOString().slice(0,10);
const fmtMin=s=>{if(!s)return"—";const p=String(s).split(":");return p.length===2?`${parseInt(p[0])}:${p[1]}`:String(s);};
const injColor=s=>{if(!s)return C.muted;const l=s.toLowerCase();if(l.includes("out"))return C.red;if(l.includes("doubtful"))return C.orange;if(l.includes("questionable")||l.includes("day"))return C.gold;return C.green;};

// ── ATOMS ─────────────────────────────────────────────────────────────────
const Logo=({abv,size=32})=><div style={{width:size,height:size,borderRadius:Math.round(size*.26),background:tc(abv),display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 2px 8px ${tc(abv)}55`}}>
  <span style={{fontSize:size*.28,fontWeight:900,color:"#fff",fontFamily:F.cond,letterSpacing:"-.5px",lineHeight:1}}>{(abv||"?").slice(0,3)}</span>
</div>;

const Spin=({size=18})=><div className="spin" style={{width:size,height:size,border:`2px solid ${C.border}`,borderTopColor:C.accent,borderRadius:"50%",flexShrink:0}}/>;
const Badge=({txt,color})=><span style={{background:color+"22",color,border:`1px solid ${color}33`,borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:700,letterSpacing:.6,whiteSpace:"nowrap",fontFamily:F.cond}}>{txt}</span>;

// ── SEARCH ────────────────────────────────────────────────────────────────
function SearchBar({onSelect}){
  const [q,setQ]=useState("");const [res,setRes]=useState([]);const [busy,setBusy]=useState(false);const [open,setOpen]=useState(false);
  const ref=useRef();const timer=useRef();
  useEffect(()=>{
    if(q.length<2){setRes([]);return;}
    clearTimeout(timer.current);
    timer.current=setTimeout(async()=>{
      setBusy(true);
      try{const d=await bdl("/players",{search:q,per_page:8});setRes(d.data||[]);setOpen(true);}catch(e){}
      setBusy(false);
    },350);
  },[q]);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);
  return <div ref={ref} style={{position:"relative",flex:1,maxWidth:440}}>
    <div style={{display:"flex",alignItems:"center",gap:8,background:C.s2,border:`1px solid ${C.border}`,borderRadius:9,padding:"7px 13px"}}>
      <span style={{color:C.muted}}>⌕</span>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search any NBA player…"
        style={{background:"none",border:"none",outline:"none",color:C.text,fontSize:13,width:"100%",fontFamily:F.body}}/>
      {busy?<Spin size={14}/>:q&&<button onClick={()=>{setQ("");setRes([]);setOpen(false);}} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16,padding:0,lineHeight:1}}>×</button>}
    </div>
    {open&&res.length>0&&<div style={{position:"absolute",top:"calc(100% + 5px)",left:0,right:0,background:C.s2,border:`1px solid ${C.border}`,borderRadius:10,zIndex:999,overflow:"hidden",boxShadow:"0 20px 50px #00000099"}}>
      {res.map((p,i)=><div key={p.id} onClick={()=>{onSelect(p);setQ("");setOpen(false);}}
        style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",borderBottom:i<res.length-1?`1px solid ${C.border}`:"none"}}
        onMouseEnter={e=>e.currentTarget.style.background=C.s3} onMouseLeave={e=>e.currentTarget.style.background=""}>
        <Logo abv={p.team?.abbreviation} size={26}/>
        <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:C.text}}>{p.first_name} {p.last_name}</div><div style={{fontSize:11,color:C.muted}}>{p.team?.full_name||"Free Agent"} · {p.position||"—"}</div></div>
        <span style={{fontSize:10,color:C.muted,fontFamily:F.cond}}>#{p.jersey_number||"—"}</span>
      </div>)}
    </div>}
  </div>;
}

// ── TICKER ────────────────────────────────────────────────────────────────
function Ticker({games,onSelect}){
  if(!games.length)return null;
  return <div style={{display:"flex",overflowX:"auto",background:C.s1,borderBottom:`1px solid ${C.border}`,scrollbarWidth:"none"}}>
    {games.map(g=>{
      const fin=g.status==="Final";const live=!fin&&g.period>0&&g.time;
      const aw=g.visitor_team?.abbreviation;const hw=g.home_team?.abbreviation;
      const awW=fin&&g.visitor_team_score>g.home_team_score;const hwW=fin&&g.home_team_score>g.visitor_team_score;
      return <div key={g.id} onClick={()=>onSelect(g)} style={{minWidth:148,padding:"7px 12px",borderRight:`1px solid ${C.border}`,flexShrink:0,cursor:"pointer",transition:"background .12s"}}
        onMouseEnter={e=>e.currentTarget.style.background=C.s3} onMouseLeave={e=>e.currentTarget.style.background=""}>
        <div style={{fontSize:9,fontWeight:700,letterSpacing:.8,marginBottom:3,fontFamily:F.cond,color:live?C.red:fin?C.muted:C.accent}}>
          {live?`Q${g.period} ${g.time}`:fin?"FINAL":g.status?.slice(0,8)||"—"}
          {live&&<span className="pulse" style={{display:"inline-block",width:5,height:5,borderRadius:"50%",background:C.red,marginLeft:5,verticalAlign:"middle"}}/>}
        </div>
        {[[aw,g.visitor_team_score,awW],[hw,g.home_team_score,hwW]].map(([abv,sc,w],j)=><div key={j} style={{display:"flex",alignItems:"center",gap:5,marginBottom:j===0?2:0}}>
          <Logo abv={abv} size={13}/>
          <span style={{fontSize:11,fontWeight:w?700:400,color:w?"#fff":C.muted,flex:1,fontFamily:F.cond}}>{abv}</span>
          <span style={{fontSize:14,fontWeight:w?800:400,color:w?"#fff":C.muted,fontFamily:F.cond}}>{sc??""}</span>
        </div>)}
      </div>;
    })}
  </div>;
}

// ── SCORE CARDS ───────────────────────────────────────────────────────────
function ScoresPage({games,loading,onSelect}){
  if(loading)return <div style={{display:"flex",justifyContent:"center",padding:60}}><Spin size={32}/></div>;
  if(!games.length)return <div style={{textAlign:"center",padding:60,color:C.muted,fontSize:14}}>No NBA games scheduled today</div>;
  return <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(265px,1fr))",gap:10}}>
    {games.map(g=>{
      const fin=g.status==="Final";const live=!fin&&g.period>0;
      const aw=g.visitor_team?.abbreviation;const hw=g.home_team?.abbreviation;
      const awW=fin&&g.visitor_team_score>g.home_team_score;const hwW=fin&&g.home_team_score>g.visitor_team_score;
      return <div key={g.id} onClick={()=>onSelect(g)} style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:11,padding:"14px 16px",cursor:"pointer",transition:"all .14s"}}
        onMouseEnter={e=>{e.currentTarget.style.borderColor=C.borderHov;e.currentTarget.style.background=C.s3;}}
        onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background=C.s2;}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          {live?<div style={{display:"flex",alignItems:"center",gap:5}}>
            <span className="pulse" style={{width:6,height:6,borderRadius:"50%",background:C.red,display:"inline-block"}}/>
            <span style={{fontSize:10,color:C.red,fontWeight:700,fontFamily:F.cond}}>LIVE · Q{g.period} {g.time}</span>
          </div>:<Badge txt={fin?"FINAL":g.status||"UPCOMING"} color={fin?C.muted:C.accent}/>}
          <span style={{fontSize:10,color:C.accent,fontWeight:700,fontFamily:F.cond}}>{fin||live?"BOX SCORE ↗":"PREVIEW ↗"}</span>
        </div>
        {[[aw,g.visitor_team_score,awW,g.visitor_team?.full_name],[hw,g.home_team_score,hwW,g.home_team?.full_name]].map(([abv,sc,w,full],j)=><div key={j} style={{display:"flex",alignItems:"center",gap:10,marginBottom:j===0?8:0}}>
          <Logo abv={abv} size={38}/>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:w?700:400,color:w?"#fff":C.muted}}>{abv}</div>
            <div style={{fontSize:10,color:C.muted}}>{j===0?"Away":"Home"}</div>
          </div>
          {sc!=null?<span style={{fontSize:28,fontWeight:w?900:400,color:w?"#fff":"#1e2840",fontFamily:F.cond}}>{sc}</span>
          :<span style={{fontSize:11,color:C.muted,fontFamily:F.cond}}>{g.datetime?new Date(g.datetime).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"TBD"}</span>}
        </div>)}
      </div>;
    })}
  </div>;
}

// ── GAME MODAL (box score + matchup preview) ──────────────────────────────
function GameModal({game,onClose}){
  const [tab,setTab]=useState("main");
  const [data,setData]=useState(null);
  const [busy,setBusy]=useState(true);
  const fin=game.status==="Final";
  const live=!fin&&game.period>0;
  const away=game.visitor_team;
  const home=game.home_team;

  useEffect(()=>{
    setBusy(true);
    const load=async()=>{
      try{
        if(fin||live){
          const [statsR,injAwR,injHmR]=await Promise.allSettled([
            bdl("/stats",{"game_ids[]":[game.id],per_page:100}),
            bdl("/player_injuries",{"team_ids[]":[away.id]}),
            bdl("/player_injuries",{"team_ids[]":[home.id]}),
          ]);
          const stats=statsR.status==="fulfilled"?statsR.value.data||[]:[];
          setData({
            type:"box",
            awayStats:stats.filter(s=>s.team?.id===away.id).sort((a,b)=>(b.pts||0)-(a.pts||0)),
            homeStats:stats.filter(s=>s.team?.id===home.id).sort((a,b)=>(b.pts||0)-(a.pts||0)),
            awayInj:injAwR.status==="fulfilled"?injAwR.value.data||[]:[], 
            homeInj:injHmR.status==="fulfilled"?injHmR.value.data||[]:[],
          });
          setTab("main");
        } else {
          const [injAwR,injHmR,gAwR,gHmR]=await Promise.allSettled([
            bdl("/player_injuries",{"team_ids[]":[away.id]}),
            bdl("/player_injuries",{"team_ids[]":[home.id]}),
            bdl("/games",{"team_ids[]":[away.id],seasons:[2024],per_page:15}),
            bdl("/games",{"team_ids[]":[home.id],seasons:[2024],per_page:15}),
          ]);
          const awGames=(gAwR.status==="fulfilled"?gAwR.value.data||[]).filter(g=>g.status==="Final").slice(0,5);
          const hmGames=(gHmR.status==="fulfilled"?gHmR.value.data||[]).filter(g=>g.status==="Final").slice(0,5);
          setData({
            type:"preview",
            awayInj:injAwR.status==="fulfilled"?injAwR.value.data||[]:[],
            homeInj:injHmR.status==="fulfilled"?injHmR.value.data||[]:[],
            awayGames:awGames,homeGames:hmGames,
          });
          setTab("main");
        }
      }catch(e){console.warn(e);}
      setBusy(false);
    };
    load();
  },[game.id]);

  const TABS=fin||live?[["main","Box Score"],["injuries","Injuries"]]:  [["main","Matchup Preview"],["injuries","Injury Report"]];

  const PlayerTable=({players,teamAbv})=><div>
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 16px",background:C.s1}}>
      <Logo abv={teamAbv} size={20}/>
      <span style={{fontSize:12,fontWeight:700,color:C.text,fontFamily:F.cond}}>{teamAbv==="away"?away.full_name:home.full_name}</span>
    </div>
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,whiteSpace:"nowrap"}}>
        <thead><tr style={{background:C.s1,borderBottom:`1px solid ${C.border}`}}>
          {["PLAYER","POS","MIN","PTS","REB","AST","STL","BLK","TO","FG","3PT","FT"].map(h=><th key={h} style={{padding:"7px 10px",textAlign:h==="PLAYER"?"left":"center",color:C.muted,fontSize:10,fontWeight:700,letterSpacing:.8,fontFamily:F.cond}}>{h}</th>)}
        </tr></thead>
        <tbody>
          {players.length===0&&<tr><td colSpan={12} style={{padding:24,textAlign:"center",color:C.muted}}>No stats available yet</td></tr>}
          {players.map((p,i)=><tr key={i} style={{borderBottom:`1px solid ${C.border}11`,background:i%2?C.s1+"55":"transparent"}}>
            <td style={{padding:"8px 14px",fontWeight:600,color:C.text,whiteSpace:"nowrap"}}>{p.player?.first_name} {p.player?.last_name}</td>
            <td style={{padding:"8px 10px",textAlign:"center",color:C.muted,fontFamily:F.cond}}>{p.player?.position||"—"}</td>
            <td style={{padding:"8px 10px",textAlign:"center",color:C.muted,fontFamily:F.cond}}>{fmtMin(p.min)}</td>
            <td style={{padding:"8px 10px",textAlign:"center",fontWeight:700,fontFamily:F.cond,color:p.pts>=25?"#fff":p.pts>=15?C.text:C.muted}}>{p.pts??0}</td>
            <td style={{padding:"8px 10px",textAlign:"center",fontFamily:F.cond,color:C.text}}>{p.reb??0}</td>
            <td style={{padding:"8px 10px",textAlign:"center",fontFamily:F.cond,color:C.text}}>{p.ast??0}</td>
            <td style={{padding:"8px 10px",textAlign:"center",fontFamily:F.cond,color:C.muted}}>{p.stl??0}</td>
            <td style={{padding:"8px 10px",textAlign:"center",fontFamily:F.cond,color:C.muted}}>{p.blk??0}</td>
            <td style={{padding:"8px 10px",textAlign:"center",fontFamily:F.cond,color:C.muted}}>{p.turnover??0}</td>
            <td style={{padding:"8px 10px",textAlign:"center",fontFamily:F.cond,color:p.fga>0&&p.fgm/p.fga>=.5?C.green:C.muted}}>{p.fgm??0}/{p.fga??0}</td>
            <td style={{padding:"8px 10px",textAlign:"center",fontFamily:F.cond,color:C.muted}}>{p.fg3m??0}/{p.fg3a??0}</td>
            <td style={{padding:"8px 10px",textAlign:"center",fontFamily:F.cond,color:C.muted}}>{p.ftm??0}/{p.fta??0}</td>
          </tr>)}
        </tbody>
      </table>
    </div>
  </div>;

  return <div style={{position:"fixed",inset:0,background:"#000000bb",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:12}}
    onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:14,width:"100%",maxWidth:900,maxHeight:"92vh",overflow:"auto",display:"flex",flexDirection:"column"}}>

      {/* Header */}
      <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:C.s2,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:20,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <Logo abv={away.abbreviation} size={36}/>
            <div><div style={{fontSize:10,color:C.muted,fontFamily:F.cond,fontWeight:700}}>AWAY</div>
              <div style={{fontSize:30,fontWeight:900,color:(fin&&game.visitor_team_score<game.home_team_score)?C.muted:"#fff",fontFamily:F.cond}}>{fin||live?game.visitor_team_score??0:""}</div></div>
          </div>
          <div style={{textAlign:"center"}}>
            {fin||live?<>
              <div style={{fontSize:11,fontWeight:700,fontFamily:F.cond,color:live?C.red:C.muted}}>{live?`Q${game.period} ${game.time}`:"FINAL"}</div>
              <div style={{display:"flex",gap:4,marginTop:4,flexWrap:"wrap",justifyContent:"center"}}>
                {[1,2,3,4].map(q=><div key={q} style={{textAlign:"center",background:C.s1,borderRadius:5,padding:"3px 7px",minWidth:30}}>
                  <div style={{fontSize:8,color:C.muted,fontFamily:F.cond,fontWeight:700}}>Q{q}</div>
                  <div style={{fontSize:10,fontFamily:F.cond,color:C.muted}}>{game[`visitor_q${q}`]??""}</div>
                  <div style={{fontSize:10,fontFamily:F.cond,color:C.muted}}>{game[`home_q${q}`]??""}</div>
                </div>)}
              </div>
            </>:<div style={{fontSize:12,color:C.accent,fontWeight:700,fontFamily:F.cond,textAlign:"center"}}>
              <div>{game.datetime?new Date(game.datetime).toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"}):"Upcoming"}</div>
              <div>{game.datetime?new Date(game.datetime).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):""}</div>
            </div>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:10,color:C.muted,fontFamily:F.cond,fontWeight:700}}>HOME</div>
              <div style={{fontSize:30,fontWeight:900,color:(fin&&game.home_team_score<game.visitor_team_score)?C.muted:"#fff",fontFamily:F.cond}}>{fin||live?game.home_team_score??0:""}</div>
            </div>
            <Logo abv={home.abbreviation} size={36}/>
          </div>
        </div>
        <button onClick={onClose} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:7,padding:"7px 12px",cursor:"pointer",fontSize:14,flexShrink:0}}>✕</button>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,background:C.s2,position:"sticky",top:110,zIndex:9,padding:"0 18px"}}>
        {TABS.map(([k,l])=><button key={k} onClick={()=>setTab(k)} style={{padding:"10px 16px",border:"none",background:"none",color:tab===k?"#fff":C.muted,fontWeight:tab===k?700:400,fontSize:13,cursor:"pointer",borderBottom:tab===k?`2px solid ${C.accent}`:"2px solid transparent",fontFamily:F.body}}>{l}</button>)}
      </div>

      {busy?<div style={{display:"flex",justifyContent:"center",padding:50}}><Spin size={28}/></div>:<>

        {/* BOX SCORE */}
        {tab==="main"&&data?.type==="box"&&<div style={{paddingBottom:16}}>
          <PlayerTable players={data.awayStats} teamAbv="away"/>
          <div style={{height:8,background:C.bg}}/>
          <PlayerTable players={data.homeStats} teamAbv="home"/>
        </div>}

        {/* MATCHUP PREVIEW */}
        {tab==="main"&&data?.type==="preview"&&<div style={{padding:18}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
            {[[away,data.awayGames],[home,data.homeGames]].map(([team,rg],ti)=>{
              const wins=rg.filter(g=>{const ih=g.home_team?.id===team.id;return ih?g.home_team_score>g.visitor_team_score:g.visitor_team_score>g.home_team_score;}).length;
              return <div key={ti} style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:11,padding:14}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <Logo abv={team.abbreviation} size={30}/>
                  <div><div style={{fontSize:13,fontWeight:700,color:"#fff",fontFamily:F.cond}}>{team.full_name}</div>
                    <div style={{fontSize:11,color:C.muted}}>Last {rg.length}: <span style={{color:wins>rg.length/2?C.green:C.red,fontWeight:700}}>{wins}-{rg.length-wins}</span></div>
                  </div>
                </div>
                {rg.map((g,i)=>{
                  const ih=g.home_team?.id===team.id;const opp=ih?g.visitor_team:g.home_team;
                  const my=ih?g.home_team_score:g.visitor_team_score;const op=ih?g.visitor_team_score:g.home_team_score;const w=my>op;
                  return <div key={i} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 0",borderBottom:i<rg.length-1?`1px solid ${C.border}22`:"none",fontSize:12}}>
                    <span style={{fontWeight:700,color:w?C.green:C.red,fontFamily:F.cond,minWidth:12}}>{w?"W":"L"}</span>
                    <Logo abv={opp?.abbreviation} size={15}/>
                    <span style={{flex:1,color:C.muted,fontFamily:F.cond}}>{ih?"vs":"@"} {opp?.abbreviation}</span>
                    <span style={{fontWeight:700,color:C.text,fontFamily:F.cond}}>{my}–{op}</span>
                  </div>;
                })}
                {rg.length===0&&<div style={{color:C.muted,fontSize:12}}>No recent games found</div>}
              </div>;
            })}
          </div>
        </div>}

        {/* INJURIES */}
        {tab==="injuries"&&data&&<div style={{padding:18}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            {[[away,data.awayInj],[home,data.homeInj]].map(([team,injs],ti)=><div key={ti}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <Logo abv={team.abbreviation} size={22}/>
                <span style={{fontSize:12,fontWeight:700,color:C.text,fontFamily:F.cond}}>{team.full_name}</span>
                <Badge txt={injs.length===0?"Healthy":`${injs.length} listed`} color={injs.length===0?C.green:C.orange}/>
              </div>
              {injs.length===0?<div style={{color:C.muted,fontSize:12,padding:"10px 0"}}>✓ No injuries reported</div>
              :<div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
                {injs.map((inj,i)=><div key={i} style={{padding:"10px 12px",borderBottom:i<injs.length-1?`1px solid ${C.border}22`:"none"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                    <span style={{fontSize:13,fontWeight:600,color:C.text}}>{inj.player?.first_name} {inj.player?.last_name}</span>
                    <Badge txt={inj.status||"Unknown"} color={injColor(inj.status)}/>
                  </div>
                  <div style={{fontSize:11,color:C.muted}}>{inj.description||"No details available"}</div>
                  {inj.return_date&&<div style={{fontSize:10,color:C.muted,marginTop:2}}>Est. return: {inj.return_date}</div>}
                </div>)}
              </div>}
            </div>)}
          </div>
        </div>}
      </>}
    </div>
  </div>;
}

// ── PLAYER PROFILE ────────────────────────────────────────────────────────
function PlayerProfile({player,onBack,favorites,toggleFav}){
  const [tab,setTab]=useState("stats");
  const [stats,setStats]=useState([]);
  const [injuries,setInjuries]=useState([]);
  const [busy,setBusy]=useState(true);
  const isFav=favorites.players.includes(player.id);
  const color=tc(player.team?.abbreviation);

  useEffect(()=>{
    setBusy(true);
    const load=async()=>{
      const seasons=[2024,2023,2022,2021,2020,2019,2018,2017,2016,2015];
      const [sR,iR]=await Promise.allSettled([
        Promise.all(seasons.map(s=>bdl("/season_averages",{season:s,"player_ids[]":[player.id]}).then(d=>({s,data:d.data?.[0]})).catch(()=>({s,data:null})))),
        bdl("/player_injuries",{"player_ids[]":[player.id]}),
      ]);
      setStats((sR.status==="fulfilled"?sR.value:[]).filter(x=>x.data).map(x=>x.data));
      setInjuries(iR.status==="fulfilled"?iR.value.data||[]:[]);
      setBusy(false);
    };
    load();
  },[player.id]);

  const cur=stats[0];
  return <div style={{minHeight:"100vh"}}>
    <div style={{background:C.s1,borderBottom:`1px solid ${C.border}`,padding:"8px 20px",display:"flex",alignItems:"center",gap:8}}>

        onMouseEnter={e=>e.currentTarget.style.color="#fff"} onMouseLeave={e=>e.currentTarget.style.color=C.muted}>← Back</button>
      <span style={{color:C.muted}}>›</span>
      <span style={{fontSize:12,color:C.text,fontWeight:600}}>{player.first_name} {player.last_name}</span>
    </div>

    <div style={{background:`linear-gradient(160deg,${color}1a 0%,transparent 55%)`,borderBottom:`1px solid ${C.border}`,padding:"22px 20px 0"}}>
      <div style={{maxWidth:1100,margin:"0 auto"}}>
        <div style={{display:"flex",gap:18,alignItems:"flex-start",flexWrap:"wrap",marginBottom:18}}>
          <div style={{width:80,height:80,borderRadius:16,background:color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,fontWeight:900,color:"#fff",fontFamily:F.cond,boxShadow:`0 6px 22px ${color}55`,flexShrink:0}}>
            {(player.first_name?.[0]||"")+(player.last_name?.[0]||"")}
          </div>

            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:5,flexWrap:"wrap"}}>

              {player.team&&<Logo abv={player.team.abbreviation} size={24}/>}
              <button onClick={()=>toggleFav("player",player.id)} style={{marginLeft:4,background:isFav?"#f0b42918":"none",border:`1px solid ${isFav?C.gold+"44":C.border}`,color:isFav?C.gold:C.muted,borderRadius:7,padding:"5px 11px",cursor:"pointer",fontSize:13,fontWeight:700}}>
                {isFav?"★ Following":"☆ Follow"}
              </button>
            </div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",fontSize:12,color:C.muted}}>
              <span>{player.position||"—"} · {player.team?.full_name||"Free Agent"}</span>
              {player.jersey_number&&<span>#{player.jersey_number}</span>}
              {player.height&&<span>{player.height}</span>}
              {player.weight&&<span>{player.weight} lbs</span>}
              {player.country&&<span>🌍 {player.country}</span>}
              {player.draft_year&&<span>Draft {player.draft_year} · R{player.draft_round} #{player.draft_number}</span>}
            </div>
          </div>
          {cur&&!busy&&<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>

        </div>
        <div style={{display:"flex",overflowX:"auto",scrollbarWidth:"none"}}>
          {[["stats","Season Stats"],["injuries","Injuries"]].map(([k,l])=><button key={k} onClick={()=>setTab(k)} style={{padding:"11px 16px",border:"none",background:"none",color:tab===k?"#fff":C.muted,fontSize:13,fontWeight:tab===k?700:400,cursor:"pointer",fontFamily:F.body,borderBottom:tab===k?`2px solid ${color}`:"2px solid transparent",whiteSpace:"nowrap"}}>{l}</button>)}
        </div>

    <div style={{maxWidth:1100,margin:"0 auto",padding:20}} className="fade" key={`${player.id}-${tab}`}>

              </tr></thead>
              <tbody>
                {stats.map((s,i)=>{
                  const fgp=s.fg_pct!=null?s.fg_pct*100:null;
                  const fg3p=s.fg3_pct!=null?s.fg3_pct*100:null;
                  const ftp=s.ft_pct!=null?s.ft_pct*100:null;
                  return <tr key={i} style={{borderBottom:`1px solid ${C.border}22`,background:i===0?"#1a2440":i%2?C.s1+"66":C.s2}}

                    <td style={{padding:"8px 12px",textAlign:"center",fontFamily:F.cond,color:C.muted}}>{s.blk?.toFixed(1)??"—"}</td>
                    <td style={{padding:"8px 12px",textAlign:"center",fontFamily:F.cond,color:C.muted}}>{s.turnover?.toFixed(1)??"—"}</td>
                    <td style={{padding:"8px 12px",textAlign:"center",fontFamily:F.cond,color:fgp!=null?(fgp>=50?C.green:fgp>=44?C.text:C.red):C.muted}}>{fgp!=null?fgp.toFixed(1)+"%":"—"}</td>

                    <td style={{padding:"8px 12px",textAlign:"center",fontFamily:F.cond,color:ftp!=null?(ftp>=85?C.green:ftp>=75?C.text:C.red):C.muted}}>{ftp!=null?ftp.toFixed(1)+"%":"—"}</td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>}
        </div>}

        {tab==="injuries"&&<div>
          <h2 style={{fontSize:16,fontWeight:800,color:"#fff",fontFamily:F.cond,marginBottom:4}}>Injury Report</h2>
          <p style={{fontSize:11,color:C.muted,marginBottom:14}}>Current status · live from BallDontLie</p>
          {injuries.length===0
            ?<div style={{textAlign:"center",padding:40,background:C.s2,border:`1px solid ${C.border}`,borderRadius:11}}>
              <div style={{fontSize:32,marginBottom:8}}>✅</div>
              <div style={{color:C.text,fontWeight:600}}>No injuries reported</div>

// ── PLAYERS PAGE ──────────────────────────────────────────────────────────
function PlayersPage({onSelect,favorites,toggleFav}){
  const [players,setPlayers]=useState([]);
  const [busy,setBusy]=useState(true);
  const [cursor,setCursor]=useState(null);
  const [hasMore,setHasMore]=useState(false);
  const [posFilter,setPosFilter]=useState("ALL");
  const [teamFilter,setTeamFilter]=useState("ALL");

  const load=useCallback(async(cur=null)=>{
    setBusy(true);
    try{
      const params={per_page:100};if(cur)params.cursor=cur;
      const d=await bdl("/players",params);
      const rows=d.data||[];
      setPlayers(prev=>cur?[...prev,...rows]:rows);
      setCursor(d.meta?.next_cursor||null);
      setHasMore(!!d.meta?.next_cursor);
    }catch(e){console.warn(e);}
    setBusy(false);
  },[]);

  useEffect(()=>{load();},[]);

  const teams=useMemo(()=>["ALL",...new Set(players.map(p=>p.team?.abbreviation).filter(Boolean))].sort((a,b)=>a==="ALL"?-1:a.localeCompare(b)),[players]);
  const filtered=useMemo(()=>players.filter(p=>{
    if(posFilter!=="ALL"&&!p.position?.includes(posFilter))return false;
    if(teamFilter!=="ALL"&&p.team?.abbreviation!==teamFilter)return false;
    return true;
  }),[players,posFilter,teamFilter]);

  return <div>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
      <h2 style={{fontSize:18,fontWeight:800,color:"#fff",fontFamily:F.cond}}>Players</h2>
      <span style={{fontSize:11,color:C.muted}}>{players.length} loaded · {filtered.length} shown</span>
      <div style={{display:"flex",gap:6,marginLeft:"auto",flexWrap:"wrap",alignItems:"center"}}>
        {["ALL","G","F","C"].map(f=><button key={f} onClick={()=>setPosFilter(f)} style={{padding:"5px 11px",borderRadius:6,border:`1px solid ${posFilter===f?C.accent:C.border}`,background:posFilter===f?C.accent+"22":"none",color:posFilter===f?C.accent:C.muted,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:F.cond}}>{f==="ALL"?"ALL POS":f}</button>)}
        <select value={teamFilter} onChange={e=>setTeamFilter(e.target.value)} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:C.s2,color:C.text,fontSize:11,cursor:"pointer",fontFamily:F.cond,outline:"none"}}>
          {teams.map(t=><option key={t}>{t}</option>)}
        </select>
      </div>
    </div>
    <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:11,overflow:"hidden"}}>
      <div style={{overflowY:"auto",maxHeight:"66vh"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,whiteSpace:"nowrap"}}>
          <thead style={{position:"sticky",top:0,background:C.s1,zIndex:1}}>
            <tr style={{borderBottom:`1px solid ${C.border}`}}>
              {["PLAYER","TEAM","POS","HT","WT","DRAFT","★"].map((h,i)=><th key={i} style={{padding:"10px 12px",textAlign:i<3?"left":"center",color:C.muted,fontSize:10,fontWeight:700,letterSpacing:.8,fontFamily:F.cond}}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {filtered.map((p,i)=>{
              const fav=favorites.players.includes(p.id);
              return <tr key={p.id} style={{borderBottom:`1px solid ${C.border}11`,background:i%2?C.s1+"44":"transparent",cursor:"pointer"}}
                onMouseEnter={e=>e.currentTarget.style.background=C.s3} onMouseLeave={e=>e.currentTarget.style.background=i%2?C.s1+"44":"transparent"}
                onClick={()=>onSelect(p)}>
                <td style={{padding:"9px 12px"}}><div style={{display:"flex",alignItems:"center",gap:7}}>
                  {fav&&<span style={{color:C.gold,fontSize:11}}>★</span>}
                  <span style={{fontWeight:600,color:C.text}}>{p.first_name} {p.last_name}</span>
                </div></td>
                <td style={{padding:"9px 12px"}}>{p.team?<div style={{display:"flex",alignItems:"center",gap:6}}><Logo abv={p.team.abbreviation} size={18}/><span style={{color:C.muted,fontFamily:F.cond}}>{p.team.abbreviation}</span></div>:<span style={{color:C.muted,fontFamily:F.cond}}>FA</span>}</td>
                <td style={{padding:"9px 12px",color:C.muted,fontFamily:F.cond}}>{p.position||"—"}</td>
                <td style={{padding:"9px 12px",textAlign:"center",color:C.muted,fontFamily:F.cond}}>{p.height||"—"}</td>
                <td style={{padding:"9px 12px",textAlign:"center",color:C.muted,fontFamily:F.cond}}>{p.weight||"—"}</td>
                <td style={{padding:"9px 12px",textAlign:"center",color:C.muted,fontFamily:F.cond}}>{p.draft_year?`${p.draft_year} R${p.draft_round} #${p.draft_number}`:"—"}</td>
                <td style={{padding:"9px 12px",textAlign:"center"}}><button onClick={e=>{e.stopPropagation();toggleFav("player",p.id);}} style={{background:"none",border:`1px solid ${fav?C.gold+"44":C.border}`,color:fav?C.gold:C.muted,borderRadius:5,padding:"3px 9px",cursor:"pointer",fontSize:12}}>{fav?"★":"☆"}</button></td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>
      {(busy||hasMore)&&<div style={{padding:14,display:"flex",justifyContent:"center",gap:10,alignItems:"center",borderTop:`1px solid ${C.border}`}}>
        {busy&&<Spin/>}
        {!busy&&hasMore&&<button onClick={()=>load(cursor)} style={{background:C.accent,border:"none",color:"#fff",borderRadius:7,padding:"8px 20px",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:F.body}}>Load More</button>}
      </div>}
    </div>
  </div>;
}

// ── STANDINGS PAGE ────────────────────────────────────────────────────────

    bdl("/standings",{season:2024}).then(d=>setRows(d.data||[])).catch(console.warn).finally(()=>setBusy(false));

  const west=rows.filter(r=>{const c=r.team?.conference||r.conference;return c==="West"||c==="Western";}).sort((a,b)=>(b.wins||0)-(a.wins||0));
  const all=rows.sort((a,b)=>(b.wins||0)-(a.wins||0));

  const Table=({teams,conf})=><div>

      {teams.map((r,i)=>{
        const abv=r.team?.abbreviation||r.abbreviation;

        const pct=w+l>0?(w/(w+l)).toFixed(3):"—";
        const strk=r.streak||`${r.current_streak_result||""}${r.current_streak||""}`;
        return <div key={i} style={{display:"grid",gridTemplateColumns:"26px 1fr 38px 38px 54px 54px 46px 34px",padding:"9px 14px",borderBottom:i<teams.length-1?`1px solid ${C.border}22`:"none",transition:"background .12s",cursor:"default"}}
          onMouseEnter={e=>e.currentTarget.style.background=C.s3} onMouseLeave={e=>e.currentTarget.style.background=""}>
          <span style={{fontSize:11,color:i<6?C.accent:C.muted,fontWeight:700,textAlign:"center",fontFamily:F.cond}}>{i+1}</span>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <Logo abv={abv} size={20}/>
            <span style={{fontSize:12,color:i<6?"#c8d4ee":C.muted,fontFamily:F.cond}}>{r.team?.full_name||r.name||abv}</span>
            {fav&&<span style={{fontSize:10,color:C.gold}}>★</span>}
          </div>
          <span style={{fontSize:12,color:C.text,fontWeight:600,textAlign:"center",fontFamily:F.cond}}>{w}</span>
          <span style={{fontSize:12,color:C.muted,textAlign:"center",fontFamily:F.cond}}>{l}</span>
          <span style={{fontSize:11,color:C.muted,textAlign:"center",fontFamily:F.cond}}>{pct}</span>
          <span style={{fontSize:11,fontWeight:700,textAlign:"center",fontFamily:F.cond,color:strk.startsWith?.("W")?C.green:strk.startsWith?.("L")?C.red:C.muted}}>{strk||"—"}</span>
          <span style={{fontSize:11,color:C.muted,textAlign:"center",fontFamily:F.cond}}>{r.l10||r.last_ten||"—"}</span>
          <button onClick={()=>toggleFav("team",abv)} style={{background:"none",border:"none",color:fav?C.gold:C.muted,cursor:"pointer",fontSize:14,textAlign:"center",padding:0}}>{fav?"★":"☆"}</button>
        </div>;
      })}
    </div>
  </div>;

  return <div style={{display:"grid",gridTemplateColumns:east.length?"1fr 1fr":"1fr",gap:20}}>
    {east.length?<><Table teams={east} conf="EAST"/><Table teams={west} conf="WEST"/></>:<Table teams={all} conf="NBA"/>}
  </div>;
}

// ── LOGIN MODAL ───────────────────────────────────────────────────────────
function LoginModal({onLogin,onClose}){
  const [mode,setMode]=useState("in");const [form,setForm]=useState({email:"",pass:"",name:""});
  const [err,setErr]=useState("");const [busy,setBusy]=useState(false);
  const go=async()=>{
    if(!form.email||!form.pass){setErr("Fill in all fields.");return;}
    setErr("");setBusy(true);
    try{
      if(mode==="up"){
        const u=new Parse.User();
        u.set("username",form.email);u.set("password",form.pass);u.set("email",form.email);u.set("displayName",form.name||form.email.split("@")[0]);
        await u.signUp();onLogin({name:u.get("displayName"),email:form.email,parseUser:u});
      }else{
        const u=await Parse.User.logIn(form.email,form.pass);
        onLogin({name:u.get("displayName")||u.get("username"),email:form.email,parseUser:u});
      }
    }catch(e){setErr(e.message||"Something went wrong.");}
    setBusy(false);
  };
  return <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
    onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:14,width:"100%",maxWidth:360,padding:26}}>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:28,marginBottom:5}}>🏆</div>
        <h2 style={{fontSize:20,fontWeight:900,color:"#fff",fontFamily:F.cond}}>FIELDR</h2>
        <p style={{fontSize:12,color:C.muted,marginTop:3}}>Save favorites · sync across devices</p>
      </div>
      <div style={{display:"flex",background:C.s1,borderRadius:9,padding:3,marginBottom:16}}>
        {[["in","Sign In"],["up","Create Account"]].map(([k,l])=><button key={k} onClick={()=>{setMode(k);setErr("");}} style={{flex:1,padding:"7px",border:"none",borderRadius:6,background:mode===k?C.s2:"none",color:mode===k?"#fff":C.muted,fontWeight:mode===k?700:400,cursor:"pointer",fontSize:13,fontFamily:F.body}}>{l}</button>)}
      </div>
      {mode==="up"&&<input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Display name" style={{width:"100%",background:C.s1,border:`1px solid ${C.border}`,borderRadius:7,padding:"10px 12px",color:C.text,fontSize:13,fontFamily:F.body,outline:"none",marginBottom:8}}/>}
      <input value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="Email" type="email" style={{width:"100%",background:C.s1,border:`1px solid ${C.border}`,borderRadius:7,padding:"10px 12px",color:C.text,fontSize:13,fontFamily:F.body,outline:"none",marginBottom:8}}/>
      <input value={form.pass} onChange={e=>setForm({...form,pass:e.target.value})} placeholder="Password" type="password" onKeyDown={e=>e.key==="Enter"&&go()} style={{width:"100%",background:C.s1,border:`1px solid ${C.border}`,borderRadius:7,padding:"10px 12px",color:C.text,fontSize:13,fontFamily:F.body,outline:"none",marginBottom:err?8:14}}/>
      {err&&<div style={{fontSize:12,color:C.red,marginBottom:10,padding:"6px 10px",background:C.red+"18",borderRadius:6}}>{err}</div>}
      <button onClick={go} disabled={busy} style={{width:"100%",background:busy?C.muted:C.accent,border:"none",borderRadius:8,padding:"11px",color:"#fff",fontSize:14,fontWeight:700,cursor:busy?"not-allowed":"pointer",fontFamily:F.body}}>
        {busy?"…":mode==="in"?"Sign In →":"Create Account →"}
      </button>
    </div>
  </div>;
}

// ── APP ROOT ──────────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState("scores");
  const [user,setUser]=useState(null);const [showLogin,setShowLogin]=useState(false);
  const [games,setGames]=useState([]);const [gBusy,setGBusy]=useState(true);
  const [activeGame,setActiveGame]=useState(null);const [activePlayer,setActivePlayer]=useState(null);
  const [favorites,setFavorites]=useState({teams:[],players:[]});
  const interval=useRef();

  // Session restore
  useEffect(()=>{
    const u=Parse.User.current();
    if(u){setUser({name:u.get("displayName")||u.get("username"),email:u.get("email"),parseUser:u});loadFavs(u);}
  },[]);

  // Live game loader
  const loadGames=useCallback(async()=>{
    try{const d=await bdl("/games",{"dates[]":[today()],per_page:30});setGames(d.data||[]);}
    catch(e){console.warn(e);}
    setGBusy(false);
  },[]);

  useEffect(()=>{loadGames();interval.current=setInterval(loadGames,30000);return()=>clearInterval(interval.current);},[loadGames]);

  // Favorites (Back4App)
  const loadFavs=async pu=>{
    try{const q=new Parse.Query("Favorites");q.equalTo("user",pu);const o=await q.first();if(o)setFavorites({teams:o.get("teams")||[],players:o.get("players")||[]});}catch(e){}
  };
  const saveFavs=async(fav,pu)=>{
    try{const q=new Parse.Query("Favorites");q.equalTo("user",pu);let o=await q.first();
    if(!o){o=new Parse.Object("Favorites");o.set("user",pu);const a=new Parse.ACL(pu);a.setPublicReadAccess(false);o.setACL(a);}
    o.set("teams",fav.teams);o.set("players",fav.players);await o.save();}catch(e){}
  };
  const toggleFav=(type,id)=>{
    if(!user){setShowLogin(true);return;}
    setFavorites(f=>{const k=type+"s";const u={...f,[k]:f[k].includes(id)?f[k].filter(x=>x!==id):[...f[k],id]};saveFavs(u,user.parseUser);return u;});
  };
  const handleLogin=u=>{setUser(u);setShowLogin(false);loadFavs(u.parseUser);};
  const handleLogout=async()=>{await Parse.User.logOut();setUser(null);setFavorites({teams:[],players:[]});};

  const favCount=favorites.teams.length+favorites.players.length;

  const UserBar=()=>user
    ?<div style={{display:"flex",alignItems:"center",gap:8}}>
      <div style={{width:28,height:28,borderRadius:"50%",background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff"}}>{user.name[0].toUpperCase()}</div>
      <span style={{fontSize:13,color:C.text,fontWeight:600}}>{user.name}</span>
      <button onClick={handleLogout} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:6,padding:"4px 9px",cursor:"pointer",fontSize:11,fontFamily:F.body}}>Sign Out</button>
    </div>
    :<button onClick={()=>setShowLogin(true)} style={{background:C.accent,border:"none",color:"#fff",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:F.body}}>Sign In</button>;

  const Header=()=><header style={{position:"sticky",top:0,zIndex:200,background:`${C.bg}f2`,backdropFilter:"blur(20px)",borderBottom:`1px solid ${C.border}`}}>
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 20px"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <span style={{fontSize:18}}>🏆</span>
        <span style={{fontSize:16,fontWeight:900,color:"#fff",fontFamily:F.cond,letterSpacing:".5px"}}>FIELDR</span>
      </div>
      <SearchBar onSelect={p=>{setActivePlayer(p);setPage("players");}}/>
      <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
        <button onClick={loadGames} title="Refresh" style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:7,padding:"6px 10px",cursor:"pointer",fontSize:13,lineHeight:1}}
          onMouseEnter={e=>e.currentTarget.style.color="#fff"} onMouseLeave={e=>e.currentTarget.style.color=C.muted}>↻</button>
        <UserBar/>
      </div>
    </div>
    <Ticker games={games} onSelect={g=>setActiveGame(g)}/>
    <nav style={{display:"flex",padding:"0 20px",overflowX:"auto",scrollbarWidth:"none"}}>
      {[{id:"scores",icon:"⚡",label:"Scores"},{id:"players",icon:"🏅",label:"Players"},{id:"standings",icon:"📊",label:"Standings"},{id:"favorites",icon:"★",label:"Favorites"}].map(n=><button key={n.id} onClick={()=>{setPage(n.id);setActivePlayer(null);}} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 14px",border:"none",background:"none",color:page===n.id?"#fff":C.muted,fontSize:13,fontWeight:page===n.id?700:400,cursor:"pointer",borderBottom:page===n.id?`2px solid ${C.accent}`:"2px solid transparent",fontFamily:F.body,whiteSpace:"nowrap"}}>
        {n.icon} {n.label}
        {n.id==="favorites"&&favCount>0&&<span style={{background:C.accent,borderRadius:9,padding:"0 5px",fontSize:9,fontWeight:700,color:"#fff",marginLeft:2}}>{favCount}</span>}
      </button>)}
    </nav>
  </header>;

  // Player profile view (full page)
  if(activePlayer){
    return <div style={{minHeight:"100vh"}}>
      <header style={{position:"sticky",top:0,zIndex:200,background:`${C.bg}f2`,backdropFilter:"blur(20px)",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 20px"}}>
          <button onClick={()=>setActivePlayer(null)} style={{display:"flex",alignItems:"center",gap:8,background:"none",border:"none",cursor:"pointer",flexShrink:0}}>
            <span style={{fontSize:18}}>🏆</span><span style={{fontSize:16,fontWeight:900,color:"#fff",fontFamily:F.cond}}>FIELDR</span>
          </button>
          <SearchBar onSelect={p=>setActivePlayer(p)}/>
          <div style={{marginLeft:"auto"}}><UserBar/></div>
        </div>
      </header>
      <PlayerProfile player={activePlayer} onBack={()=>setActivePlayer(null)} favorites={favorites} toggleFav={toggleFav}/>
      {showLogin&&<LoginModal onLogin={handleLogin} onClose={()=>setShowLogin(false)}/>}
    </div>;
  }

  return <div style={{minHeight:"100vh"}}>
    <Header/>
    <main style={{maxWidth:1200,margin:"0 auto",padding:20}} className="fade" key={page}>
      {page==="scores"&&<>
        <div style={{fontSize:10,fontWeight:800,color:C.muted,letterSpacing:1.5,fontFamily:F.cond,marginBottom:14,display:"flex",alignItems:"center",gap:12}}>
          <span>{new Date().toLocaleDateString([],{weekday:"long",month:"long",day:"numeric",year:"numeric"}).toUpperCase()} · NBA</span>
          <span style={{color:C.green,fontWeight:700}}>● LIVE · AUTO-REFRESHES 30s</span>
        </div>
        <ScoresPage games={games} loading={gBusy} onSelect={g=>setActiveGame(g)}/>
      </>}
      {page==="players"&&<PlayersPage onSelect={p=>setActivePlayer(p)} favorites={favorites} toggleFav={toggleFav}/>}
      {page==="standings"&&<StandingsPage favorites={favorites} toggleFav={toggleFav}/>}
      {page==="favorites"&&(!user
        ?<div style={{textAlign:"center",padding:"60px 20px"}}>
          <div style={{fontSize:44,marginBottom:12}}>★</div>
          <h2 style={{fontSize:20,fontWeight:800,color:"#fff",fontFamily:F.cond,marginBottom:8}}>Sign in to save favorites</h2>
          <p style={{fontSize:13,color:C.muted,marginBottom:22}}>Favorites sync across every device</p>
          <button onClick={()=>setShowLogin(true)} style={{background:C.accent,border:"none",color:"#fff",borderRadius:9,padding:"11px 26px",cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:F.body}}>Sign In / Create Account</button>
        </div>
        :<div>
          <h2 style={{fontSize:18,fontWeight:800,color:"#fff",fontFamily:F.cond,marginBottom:18}}>Your Favorites</h2>
          {favCount===0&&<div style={{textAlign:"center",padding:40,color:C.muted}}><div style={{fontSize:36,marginBottom:10}}>☆</div><p>No favorites yet — star teams and players to follow them</p></div>}
          {favorites.players.length>0&&<div style={{marginBottom:20}}>
            <div style={{fontSize:10,fontWeight:800,color:C.muted,letterSpacing:1.5,fontFamily:F.cond,marginBottom:10}}>FOLLOWED PLAYERS</div>
            <div style={{fontSize:12,color:C.muted,padding:"12px 0"}}>
              {favorites.players.length} player{favorites.players.length!==1?"s":""} followed · Search by name to view their profiles
            </div>
          </div>}
          {favorites.teams.length>0&&<div>
            <div style={{fontSize:10,fontWeight:800,color:C.muted,letterSpacing:1.5,fontFamily:F.cond,marginBottom:10}}>FAVORITE TEAMS</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:10}}>
              {favorites.teams.map((abv,i)=><div key={i} style={{background:C.s2,border:`1px solid ${C.gold}33`,borderRadius:11,padding:"13px 14px",display:"flex",alignItems:"center",gap:10}}>
                <Logo abv={abv} size={36}/>
                <span style={{fontSize:13,fontWeight:700,color:"#fff",fontFamily:F.cond,flex:1}}>{abv}</span>
                <button onClick={()=>toggleFav("team",abv)} style={{background:"none",border:"none",color:C.gold,cursor:"pointer",fontSize:16}}>★</button>
              </div>)}
            </div>
          </div>}
        </div>
      )}
    </main>
    {activeGame&&<GameModal game={activeGame} onClose={()=>setActiveGame(null)}/>}
    {showLogin&&<LoginModal onLogin={handleLogin} onClose={()=>setShowLogin(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
