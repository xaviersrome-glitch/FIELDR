<!DOCTYPE html>
<html><head><meta charset="UTF-8"/></head>
<body>
<div id="log" style="font-family:monospace;padding:20px;color:white;background:#07090f;min-height:100vh;font-size:13px;line-height:2"></div>
<script>
const log=(msg,color="#c8d4ee")=>{const d=document.getElementById("log");const p=document.createElement("p");p.style.color=color;p.textContent=msg;d.appendChild(p);};
log("Browser: "+navigator.userAgent.slice(0,80),"#f0b429");
log("","");
// Simplest possible fetch - public JSON, no auth
fetch("https://jsonplaceholder.typicode.com/todos/1")
  .then(r=>r.json()).then(d=>log("✓ jsonplaceholder works: "+JSON.stringify(d),"#1db954"))
  .catch(e=>log("✗ jsonplaceholder FAILED: "+e.message,"#e8394a"));

fetch("https://cdn.nba.com/static/json/liveData/scoreboard/todaysScoreboard_00.json")
  .then(r=>r.json()).then(d=>log("✓ NBA CDN works! games: "+d.scoreboard.games.length,"#1db954"))
  .catch(e=>log("✗ NBA CDN FAILED: "+e.message,"#e8394a"));

fetch("https://api.github.com")
  .then(r=>r.json()).then(d=>log("✓ GitHub API works","#1db954"))
  .catch(e=>log("✗ GitHub API FAILED: "+e.message,"#e8394a"));
</script>
</body></html>
