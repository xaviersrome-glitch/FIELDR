<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<title>FIELDR — Live NBA</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#07090f;font-family:'Barlow',sans-serif;color:#c8d4ee}
#root{min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#07090f}
::-webkit-scrollbar-thumb{background:#1e2840;border-radius:3px}
input,select{font-family:'Barlow',sans-serif}
input::placeholder{color:#3a4560}
select option{background:#0f1422}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:fadeUp .2s ease forwards}
.spin{width:24px;height:24px;border:2px solid #1a2236;border-top-color:#3d7fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
.live-dot{width:7px;height:7px;border-radius:50%;background:#e8394a;display:inline-block;animation:pulse 1.4s ease-in-out infinite;vertical-align:middle;margin-right:4px}
.card{background:#0f1422;border:1px solid #1a2236;border-radius:11px;padding:14px 16px;cursor:pointer;transition:all .14s}
.card:hover{border-color:#2e3d60;background:#131929}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:9px 12px;font-size:10px;font-weight:700;letter-spacing:.8px;color:#3e4e70;font-family:'Barlow Condensed',sans-serif;background:#0b0f1a;white-space:nowrap}
tbody tr{border-bottom:1px solid #1a223611;transition:background .1s;cursor:pointer}
tbody tr:hover{background:#131929}
tbody td{padding:8px 12px;white-space:nowrap;font-family:'Barlow Condensed',sans-serif;font-size:13px}
.overlay{position:fixed;inset:0;background:#000000bb;z-index:500;display:flex;align-items:center;justify-content:center;padding:12px}
.modal{background:#0f1422;border:1px solid #1a2236;border-radius:14px;width:100%;max-width:920px;max-height:92vh;overflow:auto;display:flex;flex-direction:column}
.tag{border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;letter-spacing:.6px;white-space:nowrap;font-family:'Barlow Condensed',sans-serif}
.nav-btn{display:flex;align-items:center;gap:5px;padding:10px 14px;border:none;background:none;color:#3e4e70;font-size:13px;font-weight:400;cursor:pointer;border-bottom:2px solid transparent;font-family:'Barlow',sans-serif;white-space:nowrap;transition:color .14s}
.nav-btn.active{color:#fff;font-weight:700;border-bottom-color:#3d7fff}
.tab-btn{padding:10px 16px;border:none;background:none;color:#3e4e70;font-weight:400;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;font-family:'Barlow',sans-serif;transition:color .14s}
.tab-btn.active{color:#fff;font-weight:700;border-bottom-color:#3d7fff}
</style>
</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:14px">
    <div style="font-size:32px">🏆</div>
    <div style="font-size:22px;font-weight:900;color:#fff;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px">FIELDR</div>
    <div class="spin" style="width:28px;height:28px;border-width:3px;margin-top:8px"></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>

</script>
<script>
const {createElement:h,useState,useEffect,useRef,useMemo,useCallback,Fragment}=React;

const BDL_KEY="d301104f-5072-48cc-8681-94bee3526d25";

// Rate-limit queue — max 1 request per 300ms to avoid 429s
const _queue=[];let _running=false;
const _drain=async()=>{
  if(_running)return;_running=true;
  while(_queue.length){
    const {resolve,reject,fn}=_queue.shift();
    try{resolve(await fn());}catch(e){reject(e);}
    if(_queue.length)await new Promise(r=>setTimeout(r,300));
  }
  _running=false;
};
const bdlRaw=async(path,params={})=>{
  const url=new URL("https://api.balldontlie.io/v1"+path);
  Object.entries(params).forEach(([k,v])=>{
    if(Array.isArray(v))v.forEach(x=>url.searchParams.append(k,String(x)));
    else url.searchParams.set(k,String(v));
  });
  const r=await fetch(url.toString(),{headers:{"Authorization":BDL_KEY,"Content-Type":"application/json"}});
  if(r.status===429){await new Promise(r=>setTimeout(r,2000));throw new Error("Rate limited");}
  if(!r.ok)throw new Error("BDL "+r.status);
  return r.json();
};
const bdl=(path,params={})=>new Promise((resolve,reject)=>{
  _queue.push({resolve,reject,fn:()=>bdlRaw(path,params)});
  _drain();
});

// get last N dates that had games
const getRecentDates=(n)=>{
  const dates=[];
  const d=new Date();
  for(let i=0;i<n;i++){
    const s=new Date(d);
    s.setDate(d.getDate()-i);
    dates.push(s.toISOString().slice(0,10));
  }
  return dates;
};

const fmtDate=s=>{
  const d=new Date(s+"T12:00:00");
  return d.toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"});
};

const TC={ATL:"#E03A3E",BKN:"#999",BOS:"#007A33",CHA:"#1D1160",CHI:"#CE1141",CLE:"#860038",DAL:"#00538C",DEN:"#0E2240",DET:"#C8102E",GSW:"#1D428A",HOU:"#CE1141",IND:"#002D62",LAC:"#C8102E",LAL:"#552583",MEM:"#5D76A9",MIA:"#98002E",MIL:"#00471B",MIN:"#236192",NOP:"#0C2340",NYK:"#006BB6",OKC:"#007AC1",ORL:"#0077C0",PHI:"#006BB6",PHX:"#1D1160",POR:"#E03A3E",SAC:"#5A2D81",SAS:"#aaa",TOR:"#CE1141",UTA:"#002B5C",WAS:"#002B5C"};
const tc=a=>TC[a]||"#3d7fff";
const injColor=s=>{if(!s)return"#3e4e70";const l=s.toLowerCase();if(l.includes("out"))return"#e8394a";if(l.includes("doubtful"))return"#f5820d";if(l.includes("question")||l.includes("day"))return"#f0b429";return"#1db954";};

const Logo=({abv,size=32})=>h("div",{style:{width:size,height:size,borderRadius:Math.round(size*.26),background:tc(abv),display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:"0 2px 8px "+tc(abv)+"55"}},
  h("span",{style:{fontSize:size*.28,fontWeight:900,color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"-.5px",lineHeight:1}},(abv||"?").slice(0,3))
);
const Spinner=({size=22,thick=2})=>h("div",{className:"spin",style:{width:size,height:size,borderWidth:thick}});
const Badge=({txt,color})=>h("span",{className:"tag",style:{background:color+"22",color,border:"1px solid "+color+"33"}},txt);

// ── SEARCH ──────────────────────────────────────────────────────────────
function SearchBar({onSelect}){
  const [q,setQ]=useState("");const [res,setRes]=useState([]);const [busy,setBusy]=useState(false);const [open,setOpen]=useState(false);
  const ref=useRef();const timer=useRef();
  useEffect(()=>{const fn=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",fn);return()=>document.removeEventListener("mousedown",fn);},[]);
  const onInput=e=>{
    const v=e.target.value;setQ(v);clearTimeout(timer.current);
    if(v.length<2){setRes([]);return;}
    timer.current=setTimeout(async()=>{
      setBusy(true);
      try{const d=await bdl("/players",{search:v,per_page:8});setRes(d.data||[]);setOpen(true);}catch(e){}
      setBusy(false);
    },400);
  };
  return h("div",{ref,style:{position:"relative",flex:1,maxWidth:440}},
    h("div",{style:{display:"flex",alignItems:"center",gap:8,background:"#0f1422",border:"1px solid #1a2236",borderRadius:9,padding:"7px 13px"}},
      h("span",{style:{color:"#3e4e70",fontSize:14}},"⌕"),
      h("input",{value:q,onInput,placeholder:"Search any NBA player…",style:{background:"none",border:"none",outline:"none",color:"#c8d4ee",fontSize:13,width:"100%"}}),
      busy?h(Spinner,{size:14}):q&&h("button",{onClick:()=>{setQ("");setRes([]);setOpen(false);},style:{background:"none",border:"none",color:"#3e4e70",cursor:"pointer",fontSize:18,padding:0,lineHeight:1}},"×")
    ),
    open&&res.length>0&&h("div",{style:{position:"absolute",top:"calc(100% + 5px)",left:0,right:0,background:"#0f1422",border:"1px solid #1a2236",borderRadius:10,zIndex:999,overflow:"hidden",boxShadow:"0 20px 50px #00000099"}},
      res.map((p,i)=>h("div",{key:p.id,onClick:()=>{onSelect(p);setQ("");setOpen(false);},
        style:{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",borderBottom:i<res.length-1?"1px solid #1a2236":"none"},
        onMouseEnter:e=>e.currentTarget.style.background="#131929",onMouseLeave:e=>e.currentTarget.style.background=""},
        h(Logo,{abv:p.team&&p.team.abbreviation,size:26}),
        h("div",{style:{flex:1}},
          h("div",{style:{fontSize:13,fontWeight:600,color:"#c8d4ee"}},p.first_name+" "+p.last_name),
          h("div",{style:{fontSize:11,color:"#3e4e70"}},(p.team?p.team.full_name:"Free Agent")+" · "+(p.position||"—"))
        )
      ))
    )
  );
}

// ── SCORES PAGE ──────────────────────────────────────────────────────────
function ScoresPage({onSelectGame}){
  const [games,setGames]=useState([]);
  const [busy,setBusy]=useState(true);
  const [selDate,setSelDate]=useState(null);
  const [dates,setDates]=useState([]);

  useEffect(()=>{
    const ds=getRecentDates(10);
    setDates(ds);
    // Just load yesterday — most likely to have games
    const yesterday=ds[1];
    setSelDate(yesterday);
    setBusy(true);
    bdl("/games",{"dates[]":[yesterday],per_page:30,"seasons[]":[2024]})
      .then(d=>{
        if(d.data&&d.data.length>0){setGames(d.data);}
        else{
          // try day before yesterday
          bdl("/games",{"dates[]":[ds[2]],per_page:30,"seasons[]":[2024]})
            .then(d2=>{setGames(d2.data||[]);setSelDate(ds[2]);})
            .catch(()=>{})
            .finally(()=>setBusy(false));
          return;
        }
        setBusy(false);
      })
      .catch(e=>{console.warn(e);setBusy(false);});
  },[]);


  const onDateClick=async(date)=>{
    setBusy(true);
    setSelDate(date);
    setGames([]);
    try{
      const d=await bdl("/games",{"dates[]":[date],per_page:30,"seasons[]":[2024]});
      setGames(d.data||[]);
    }catch(e){console.warn(e);}
    setBusy(false);
  };

  return h("div",null,
    // Date strip
    h("div",{style:{display:"flex",gap:6,overflowX:"auto",marginBottom:16,paddingBottom:4,scrollbarWidth:"none"}},
      dates.map(d=>h("button",{key:d,onClick:()=>onDateClick(d),
        style:{flexShrink:0,padding:"6px 12px",borderRadius:7,border:"1px solid "+(selDate===d?"#3d7fff":"#1a2236"),background:selDate===d?"#3d7fff22":"none",color:selDate===d?"#3d7fff":"#3e4e70",fontSize:11,fontWeight:selDate===d?700:400,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",whiteSpace:"nowrap"}},
        d===getRecentDates(1)[0]?"TODAY":fmtDate(d)
      ))
    ),
    busy?h("div",{style:{display:"flex",justifyContent:"center",padding:60}},h(Spinner,{size:36,thick:3})):
    games.length===0?h("div",{style:{textAlign:"center",padding:60,color:"#3e4e70",fontSize:14}},"No games on this date"):
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(265px,1fr))",gap:10}},
      games.map(g=>{
        const fin=g.status==="Final";const live=!fin&&g.period>0;
        const aw=g.visitor_team&&g.visitor_team.abbreviation;const hw=g.home_team&&g.home_team.abbreviation;
        const awW=fin&&g.visitor_team_score>g.home_team_score;const hwW=fin&&g.home_team_score>g.visitor_team_score;
        return h("div",{key:g.id,className:"card",onClick:()=>onSelectGame(g)},
          h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:10,alignItems:"center"}},
            live?h("div",{style:{display:"flex",alignItems:"center"}},h("span",{className:"live-dot"}),h("span",{style:{fontSize:10,color:"#e8394a",fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif"}},"LIVE · Q"+g.period+" "+g.time))
            :h(Badge,{txt:fin?"FINAL":(g.status||"SCHEDULED"),color:fin?"#3e4e70":"#3d7fff"}),
            h("span",{style:{fontSize:10,color:"#3d7fff",fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif"}},fin||live?"BOX SCORE ↗":"PREVIEW ↗")
          ),
          h("div",{style:{marginBottom:8}},
            h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:8}},
              h(Logo,{abv:aw,size:38}),
              h("div",{style:{flex:1}},h("div",{style:{fontSize:13,fontWeight:awW?700:400,color:awW?"#fff":"#3e4e70"}},aw),h("div",{style:{fontSize:10,color:"#3e4e70"}},"Away")),
              fin||live?h("span",{style:{fontSize:28,fontWeight:awW?900:400,color:awW?"#fff":"#3e4e70",fontFamily:"'Barlow Condensed',sans-serif"}},g.visitor_team_score)
              :h("span",{style:{fontSize:11,color:"#3e4e70"}},g.datetime?new Date(g.datetime).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"TBD")
            ),
            h("div",{style:{display:"flex",alignItems:"center",gap:10}},
              h(Logo,{abv:hw,size:38}),
              h("div",{style:{flex:1}},h("div",{style:{fontSize:13,fontWeight:hwW?700:400,color:hwW?"#fff":"#3e4e70"}},hw),h("div",{style:{fontSize:10,color:"#3e4e70"}},"Home")),
              fin||live?h("span",{style:{fontSize:28,fontWeight:hwW?900:400,color:hwW?"#fff":"#3e4e70",fontFamily:"'Barlow Condensed',sans-serif"}},g.home_team_score)
              :null
            )
          )
        );
      })
    )
  );
}

// ── GAME MODAL ───────────────────────────────────────────────────────────
function GameModal({game,onClose}){
  const [tab,setTab]=useState("box");
  const [data,setData]=useState(null);
  const [busy,setBusy]=useState(true);
  const fin=game.status==="Final";const live=!fin&&game.period>0;
  const away=game.visitor_team;const home=game.home_team;

  useEffect(()=>{
    setBusy(true);
    (async()=>{
      try{
        if(fin||live){
          const [sR,aiR,hiR]=await Promise.allSettled([
            bdl("/stats",{"game_ids[]":[game.id],per_page:100}),
            bdl("/player_injuries",{"team_ids[]":[away.id]}),
            bdl("/player_injuries",{"team_ids[]":[home.id]}),
          ]);
          const stats=sR.status==="fulfilled"?sR.value.data||[]:[];
          setData({type:"box",
            awayStats:stats.filter(s=>s.team&&s.team.id===away.id).sort((a,b)=>(b.pts||0)-(a.pts||0)),
            homeStats:stats.filter(s=>s.team&&s.team.id===home.id).sort((a,b)=>(b.pts||0)-(a.pts||0)),
            awayInj:aiR.status==="fulfilled"?aiR.value.data||[]:[],
            homeInj:hiR.status==="fulfilled"?hiR.value.data||[]:[]
          });
          setTab("box");
        } else {
          const [aiR,hiR,agR,hgR]=await Promise.allSettled([
            bdl("/player_injuries",{"team_ids[]":[away.id]}),
            bdl("/player_injuries",{"team_ids[]":[home.id]}),
            bdl("/games",{"team_ids[]":[away.id],"seasons[]":[2024],per_page:15}),
            bdl("/games",{"team_ids[]":[home.id],"seasons[]":[2024],per_page:15}),
          ]);
          const rawAg=agR.status==="fulfilled"&&agR.value.data?agR.value.data:[];
          const rawHg=hgR.status==="fulfilled"&&hgR.value.data?hgR.value.data:[];
          setData({type:"preview",
            awayInj:aiR.status==="fulfilled"?aiR.value.data||[]:[],
            homeInj:hiR.status==="fulfilled"?hiR.value.data||[]:[],
            awayGames:rawAg.filter(g=>g.status==="Final").slice(0,5),
            homeGames:rawHg.filter(g=>g.status==="Final").slice(0,5)
          });
          setTab("preview");
        }
      }catch(e){console.warn(e);}
      setBusy(false);
    })();
  },[game.id]);

  const TABS=fin||live?[["box","Box Score"],["injuries","Injuries"]]:[["preview","Matchup"],["injuries","Injuries"]];

  const StatRow=({p,i})=>{
    const fgpct=p.fga>0?p.fgm/p.fga:0;
    return h("tr",{style:{background:i%2?"#0b0f1a55":"transparent",cursor:"default"}},
      h("td",{style:{padding:"8px 14px",fontWeight:600,color:"#c8d4ee",textAlign:"left"}},p.player?p.player.first_name+" "+p.player.last_name:"—"),
      h("td",{style:{textAlign:"center",color:"#3e4e70"}},p.player?p.player.position||"—":"—"),
      h("td",{style:{textAlign:"center",color:"#3e4e70"}},p.min?String(p.min).split(":")[0]+"m":"—"),
      h("td",{style:{textAlign:"center",fontWeight:700,color:(p.pts||0)>=25?"#fff":(p.pts||0)>=15?"#c8d4ee":"#3e4e70"}},p.pts||0),
      h("td",{style:{textAlign:"center",color:"#c8d4ee"}},p.reb||0),
      h("td",{style:{textAlign:"center",color:"#c8d4ee"}},p.ast||0),
      h("td",{style:{textAlign:"center",color:"#3e4e70"}},p.stl||0),
      h("td",{style:{textAlign:"center",color:"#3e4e70"}},p.blk||0),
      h("td",{style:{textAlign:"center",color:"#3e4e70"}},p.turnover||0),
      h("td",{style:{textAlign:"center",color:fgpct>=.5?"#1db954":fgpct>=.4?"#c8d4ee":"#3e4e70"}},(p.fgm||0)+"/"+(p.fga||0)),
      h("td",{style:{textAlign:"center",color:"#3e4e70"}},(p.fg3m||0)+"/"+(p.fg3a||0)),
      h("td",{style:{textAlign:"center",color:"#3e4e70"}},(p.ftm||0)+"/"+(p.fta||0))
    );
  };

  const TeamBox=({players,team})=>h(Fragment,null,
    h("div",{style:{display:"flex",alignItems:"center",gap:8,padding:"8px 16px",background:"#0b0f1a"}},
      h(Logo,{abv:team.abbreviation,size:20}),
      h("span",{style:{fontSize:12,fontWeight:700,color:"#c8d4ee",fontFamily:"'Barlow Condensed',sans-serif"}},team.full_name)
    ),
    h("div",{style:{overflowX:"auto"}},
      h("table",null,
        h("thead",null,h("tr",null,["PLAYER","POS","MIN","PTS","REB","AST","STL","BLK","TO","FG","3PT","FT"].map(c=>h("th",{key:c,style:{textAlign:c==="PLAYER"?"left":"center"}},c)))),
        h("tbody",null,
          players.length===0?h("tr",null,h("td",{colSpan:12,style:{padding:24,textAlign:"center",color:"#3e4e70"}},"No stats available")):
          players.map((p,i)=>h(StatRow,{key:i,p,i}))
        )
      )
    )
  );

  const InjList=({team,injs})=>h("div",null,
    h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:10}},
      h(Logo,{abv:team.abbreviation,size:22}),
      h("span",{style:{fontSize:12,fontWeight:700,color:"#c8d4ee",fontFamily:"'Barlow Condensed',sans-serif"}},team.full_name),
      h(Badge,{txt:injs.length===0?"Healthy":injs.length+" listed",color:injs.length===0?"#1db954":"#f5820d"})
    ),
    injs.length===0?h("div",{style:{color:"#3e4e70",fontSize:12,padding:"8px 0"}},"✓ No injuries reported"):
    h("div",{style:{background:"#0b0f1a",border:"1px solid #1a2236",borderRadius:10,overflow:"hidden"}},
      injs.map((inj,i)=>h("div",{key:i,style:{padding:"10px 12px",borderBottom:i<injs.length-1?"1px solid #1a223222":"none"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}},
          h("span",{style:{fontSize:13,fontWeight:600,color:"#c8d4ee"}},(inj.player?inj.player.first_name+" "+inj.player.last_name:"Unknown")),
          h(Badge,{txt:inj.status||"Listed",color:injColor(inj.status)})
        ),
        h("div",{style:{fontSize:11,color:"#3e4e70"}},inj.description||"No details"),
        inj.return_date&&h("div",{style:{fontSize:10,color:"#3e4e70",marginTop:2}},"Est. return: "+inj.return_date)
      ))
    )
  );

  return h("div",{className:"overlay",onClick:e=>e.target===e.currentTarget&&onClose()},
    h("div",{className:"modal"},
      // Header
      h("div",{style:{padding:"14px 18px",borderBottom:"1px solid #1a2236",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:"#0f1422",zIndex:10,flexWrap:"wrap",gap:10}},
        h("div",{style:{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}},
          h("div",{style:{display:"flex",alignItems:"center",gap:10}},
            h(Logo,{abv:away.abbreviation,size:34}),
            h("div",null,
              h("div",{style:{fontSize:9,color:"#3e4e70",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}},"AWAY"),

// ── PLAYERS PAGE ─────────────────────────────────────────────────────────
function PlayersPage({onSelect,favorites,toggleFav}){
  const [players,setPlayers]=useState([]);
  const [busy,setBusy]=useState(true);
  const [cursor,setCursor]=useState(null);
  const [hasMore,setHasMore]=useState(false);
  const [posF,setPosF]=useState("ALL");
  const [teamF,setTeamF]=useState("ALL");
  const [err,setErr]=useState(null);

  const load=useCallback(async(cur)=>{
    setBusy(true);setErr(null);
    try{
      const p={per_page:100};
      if(cur)p.cursor=cur;
      const d=await bdl("/players",p);
      const rows=d.data||[];
      setPlayers(prev=>cur?[...prev,...rows]:rows);
      setCursor(d.meta&&d.meta.next_cursor?d.meta.next_cursor:null);
      setHasMore(!!(d.meta&&d.meta.next_cursor));
    }catch(e){console.warn(e);setErr("Failed to load players. Check console.");}
    setBusy(false);
  },[]);

  useEffect(()=>{load();},[]);

  const teams=useMemo(()=>{
    const s=new Set(players.map(p=>p.team&&p.team.abbreviation).filter(Boolean));
    return ["ALL",...Array.from(s).sort()];
  },[players]);

  const filtered=useMemo(()=>players.filter(p=>{
    if(posF!=="ALL"&&!(p.position&&p.position.includes(posF)))return false;
    if(teamF!=="ALL"&&!(p.team&&p.team.abbreviation===teamF))return false;
    return true;
  }),[players,posF,teamF]);

  return h("div",null,
    h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}},
      h("h2",{style:{fontSize:18,fontWeight:800,color:"#fff",fontFamily:"'Barlow Condensed',sans-serif"}},"Players"),
      h("span",{style:{fontSize:11,color:"#3e4e70"}},players.length+" loaded · "+filtered.length+" shown"),
      h("div",{style:{display:"flex",gap:6,marginLeft:"auto",flexWrap:"wrap",alignItems:"center"}},
        ["ALL","G","F","C"].map(f=>h("button",{key:f,onClick:()=>setPosF(f),style:{padding:"5px 11px",borderRadius:6,border:"1px solid "+(posF===f?"#3d7fff":"#1a2236"),background:posF===f?"#3d7fff22":"none",color:posF===f?"#3d7fff":"#3e4e70",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif"}},f==="ALL"?"ALL POS":f)),
        h("select",{value:teamF,onChange:e=>setTeamF(e.target.value),style:{padding:"5px 10px",borderRadius:6,border:"1px solid #1a2236",background:"#0f1422",color:"#c8d4ee",fontSize:11,cursor:"pointer",outline:"none"}},
          teams.map(t=>h("option",{key:t},t))
        )
      )
    ),
    err&&h("div",{style:{background:"#e8394a22",border:"1px solid #e8394a44",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"#e8394a",fontSize:12}},err),
    h("div",{style:{background:"#0f1422",border:"1px solid #1a2236",borderRadius:11,overflow:"hidden"}},
      h("div",{style:{overflowY:"auto",maxHeight:"65vh"}},
        h("table",null,
          h("thead",null,h("tr",null,
            ["PLAYER","TEAM","POS","HT","WT","DRAFT","★"].map((c,i)=>h("th",{key:c,style:{textAlign:i<3?"left":"center"}},c))
          )),
          h("tbody",null,
            filtered.length===0&&!busy?h("tr",null,h("td",{colSpan:7,style:{padding:30,textAlign:"center",color:"#3e4e70"}},"No players match filter")):
            filtered.map((p,i)=>{
              const fav=favorites.players.includes(p.id);
              return h("tr",{key:p.id,onClick:()=>onSelect(p),style:{background:i%2?"#0b0f1a33":"transparent"}},
                h("td",{style:{padding:"9px 12px",textAlign:"left"}},
                  h("div",{style:{display:"flex",alignItems:"center",gap:7}},
                    fav&&h("span",{style:{color:"#f0b429",fontSize:11}},"★"),
                    h("span",{style:{fontWeight:600,color:"#c8d4ee"}},p.first_name+" "+p.last_name)
                  )
                ),
                h("td",{style:{padding:"9px 12px",textAlign:"left"}},
                  p.team?h("div",{style:{display:"flex",alignItems:"center",gap:6}},h(Logo,{abv:p.team.abbreviation,size:18}),h("span",{style:{color:"#3e4e70"}},p.team.abbreviation)):h("span",{style:{color:"#3e4e70"}},"FA")
                ),
                h("td",{style:{textAlign:"left",padding:"9px 12px",color:"#3e4e70"}},p.position||"—"),
                h("td",{style:{textAlign:"center",color:"#3e4e70"}},p.height||"—"),
                h("td",{style:{textAlign:"center",color:"#3e4e70"}},p.weight||"—"),
                h("td",{style:{textAlign:"center",color:"#3e4e70"}},p.draft_year?p.draft_year+" R"+p.draft_round+" #"+p.draft_number:"—"),
                h("td",{style:{textAlign:"center"}},
                  h("button",{onClick:e=>{e.stopPropagation();toggleFav("player",p.id);},style:{background:"none",border:"1px solid "+(fav?"#f0b42944":"#1a2236"),color:fav?"#f0b429":"#3e4e70",borderRadius:5,padding:"3px 9px",cursor:"pointer",fontSize:12}},fav?"★":"☆")
                )
              );
            })
          )
        )
      ),
      (busy||hasMore)&&h("div",{style:{padding:14,display:"flex",justifyContent:"center",gap:12,alignItems:"center",borderTop:"1px solid #1a2236"}},
        busy&&h(Spinner),
        !busy&&hasMore&&h("button",{onClick:()=>load(cursor),style:{background:"#3d7fff",border:"none",color:"#fff",borderRadius:7,padding:"8px 20px",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'Barlow',sans-serif"}},"Load More Players")
      )
    )
  );
}

  const [rows,setRows]=useState([]);const [busy,setBusy]=useState(true);const [err,setErr]=useState(null);

      .then(d=>setRows(d.data||[]))

  if(busy)return h("div",{style:{display:"flex",justifyContent:"center",padding:60}},h(Spinner,{size:32,thick:3}));
  if(err)return h("div",{style:{textAlign:"center",padding:40,color:"#e8394a"}},err);

  const east=rows.filter(r=>r.team&&r.team.conference&&r.team.conference.includes("East")).sort((a,b)=>(b.wins||0)-(a.wins||0));
  const west=rows.filter(r=>r.team&&r.team.conference&&r.team.conference.includes("West")).sort((a,b)=>(b.wins||0)-(a.wins||0));
  const all=[...rows].sort((a,b)=>(b.wins||0)-(a.wins||0));

  const Table=({teams,conf})=>h("div",null,
    h("div",{style:{fontSize:11,fontWeight:800,color:"#3d7fff",letterSpacing:2,marginBottom:10,fontFamily:"'Barlow Condensed',sans-serif"}},conf),
    h("div",{style:{background:"#0f1422",border:"1px solid #1a2236",borderRadius:11,overflow:"hidden"}},
      h("div",{style:{display:"grid",gridTemplateColumns:"26px 1fr 38px 38px 54px 54px 34px",padding:"8px 14px",borderBottom:"1px solid #1a2236",background:"#0b0f1a"}},
        ["#","TEAM","W","L","PCT","STRK","★"].map(c=>h("span",{key:c,style:{fontSize:9,color:"#3e4e70",fontWeight:700,letterSpacing:.8,textAlign:c==="TEAM"?"left":"center",fontFamily:"'Barlow Condensed',sans-serif"}},c))
      ),
      teams.map((r,i)=>{
        const abv=r.team?r.team.abbreviation:(r.abbreviation||"");
        const fav=favorites.teams.includes(abv);
        const w=r.wins||0,l=r.losses||0;
        const pct=w+l>0?(w/(w+l)).toFixed(3):"—";
        const strk=r.streak||(r.current_streak_result&&r.current_streak?(r.current_streak_result+r.current_streak):"—");
        return h("div",{key:i,style:{display:"grid",gridTemplateColumns:"26px 1fr 38px 38px 54px 54px 34px",padding:"9px 14px",borderBottom:i<teams.length-1?"1px solid #1a223222":"none",transition:"background .12s"},
          onMouseEnter:e=>e.currentTarget.style.background="#131929",onMouseLeave:e=>e.currentTarget.style.background=""},
          h("span",{style:{fontSize:11,color:i<6?"#3d7fff":"#3e4e70",fontWeight:700,textAlign:"center",fontFamily:"'Barlow Condensed',sans-serif"}},i+1),
          h("div",{style:{display:"flex",alignItems:"center",gap:7}},
            h(Logo,{abv,size:20}),
            h("span",{style:{fontSize:12,color:i<6?"#c8d4ee":"#3e4e70",fontFamily:"'Barlow Condensed',sans-serif"}},r.team?r.team.full_name:abv),
            fav&&h("span",{style:{fontSize:10,color:"#f0b429"}},"★")
          ),
          h("span",{style:{fontSize:12,color:"#c8d4ee",fontWeight:600,textAlign:"center",fontFamily:"'Barlow Condensed',sans-serif"}},w),
          h("span",{style:{fontSize:12,color:"#3e4e70",textAlign:"center",fontFamily:"'Barlow Condensed',sans-serif"}},l),
          h("span",{style:{fontSize:11,color:"#3e4e70",textAlign:"center",fontFamily:"'Barlow Condensed',sans-serif"}},pct),
          h("span",{style:{fontSize:11,fontWeight:700,textAlign:"center",fontFamily:"'Barlow Condensed',sans-serif",color:String(strk).startsWith("W")?"#1db954":String(strk).startsWith("L")?"#e8394a":"#3e4e70"}},strk),
          h("button",{onClick:()=>toggleFav("team",abv),style:{background:"none",border:"none",color:fav?"#f0b429":"#3e4e70",cursor:"pointer",fontSize:14,textAlign:"center",padding:0}},fav?"★":"☆")
        );
      })
    )
  );

  return east.length>0
    ?h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}},h(Table,{teams:east,conf:"EAST CONFERENCE"}),h(Table,{teams:west,conf:"WEST CONFERENCE"}))
    :h(Table,{teams:all,conf:"NBA STANDINGS"});
}

// ── LOGIN ────────────────────────────────────────────────────────────────
function LoginModal({onLogin,onClose}){
  const [mode,setMode]=useState("in");const [email,setEmail]=useState("");const [pass,setPass]=useState("");const [name,setName]=useState("");const [err,setErr]=useState("");const [busy,setBusy]=useState(false);
  const go=async()=>{
    if(!email||!pass){setErr("Fill in all fields.");return;}
    if(!window._parseReady){setErr("Still loading, try again in a moment.");return;}
    setErr("");setBusy(true);
    try{
      if(mode==="up"){const u=new Parse.User();u.set("username",email);u.set("password",pass);u.set("email",email);u.set("displayName",name||email.split("@")[0]);await u.signUp();onLogin({name:u.get("displayName"),email,parseUser:u});}
      else{const u=await Parse.User.logIn(email,pass);onLogin({name:u.get("displayName")||u.get("username"),email,parseUser:u});}
    }catch(e){setErr(e.message||"Something went wrong.");}
    setBusy(false);
  };
  return h("div",{className:"overlay",onClick:e=>e.target===e.currentTarget&&onClose()},
    h("div",{style:{background:"#0f1422",border:"1px solid #1a2236",borderRadius:14,width:"100%",maxWidth:360,padding:26}},
      h("div",{style:{textAlign:"center",marginBottom:20}},h("div",{style:{fontSize:28,marginBottom:5}},"🏆"),h("h2",{style:{fontSize:20,fontWeight:900,color:"#fff",fontFamily:"'Barlow Condensed',sans-serif"}},"FIELDR"),h("p",{style:{fontSize:12,color:"#3e4e70",marginTop:3}},"Save favorites · sync across devices")),
      h("div",{style:{display:"flex",background:"#0b0f1a",borderRadius:9,padding:3,marginBottom:16}},
        [["in","Sign In"],["up","Create Account"]].map(([k,l])=>h("button",{key:k,onClick:()=>{setMode(k);setErr("");},style:{flex:1,padding:"7px",border:"none",borderRadius:6,background:mode===k?"#0f1422":"none",color:mode===k?"#fff":"#3e4e70",fontWeight:mode===k?700:400,cursor:"pointer",fontSize:13,fontFamily:"'Barlow',sans-serif"}},l))
      ),
      mode==="up"&&h("input",{value:name,onInput:e=>setName(e.target.value),placeholder:"Display name",style:{width:"100%",background:"#0b0f1a",border:"1px solid #1a2236",borderRadius:7,padding:"10px 12px",color:"#c8d4ee",fontSize:13,outline:"none",marginBottom:8,display:"block"}}),
      h("input",{value:email,onInput:e=>setEmail(e.target.value),placeholder:"Email",type:"email",style:{width:"100%",background:"#0b0f1a",border:"1px solid #1a2236",borderRadius:7,padding:"10px 12px",color:"#c8d4ee",fontSize:13,outline:"none",marginBottom:8,display:"block"}}),
      h("input",{value:pass,onInput:e=>setPass(e.target.value),placeholder:"Password",type:"password",onKeyDown:e=>e.key==="Enter"&&go(),style:{width:"100%",background:"#0b0f1a",border:"1px solid #1a2236",borderRadius:7,padding:"10px 12px",color:"#c8d4ee",fontSize:13,outline:"none",marginBottom:err?8:14,display:"block"}}),
      err&&h("div",{style:{fontSize:12,color:"#e8394a",marginBottom:10,padding:"6px 10px",background:"#e8394a18",borderRadius:6}},err),
      h("button",{onClick:go,disabled:busy,style:{width:"100%",background:busy?"#3e4e70":"#3d7fff",border:"none",borderRadius:8,padding:"11px",color:"#fff",fontSize:14,fontWeight:700,cursor:busy?"not-allowed":"pointer",fontFamily:"'Barlow',sans-serif",display:"block"}},busy?"…":mode==="in"?"Sign In →":"Create Account →")
    )
  );
}

// ── APP ───────────────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState("scores");
  const [user,setUser]=useState(null);const [showLogin,setShowLogin]=useState(false);
  const [activeGame,setActiveGame]=useState(null);const [activePlayer,setActivePlayer]=useState(null);
  const [favorites,setFavorites]=useState({teams:[],players:[]});

  useEffect(()=>{
    const tryRestore=()=>{
      if(window._parseReady){
        const u=Parse.User.current();
        if(u){setUser({name:u.get("displayName")||u.get("username"),email:u.get("email"),parseUser:u});loadFavs(u);}
      }else setTimeout(tryRestore,300);
    };
    tryRestore();
  },[]);

  const loadFavs=async pu=>{try{const q=new Parse.Query("Favorites");q.equalTo("user",pu);const o=await q.first();if(o)setFavorites({teams:o.get("teams")||[],players:o.get("players")||[]});}catch(e){}};
  const saveFavs=async(fav,pu)=>{try{const q=new Parse.Query("Favorites");q.equalTo("user",pu);let o=await q.first();if(!o){o=new Parse.Object("Favorites");o.set("user",pu);const a=new Parse.ACL(pu);a.setPublicReadAccess(false);o.setACL(a);}o.set("teams",fav.teams);o.set("players",fav.players);await o.save();}catch(e){}};
  const toggleFav=(type,id)=>{if(!user){setShowLogin(true);return;}setFavorites(f=>{const k=type+"s";const u=Object.assign({},f,{[k]:f[k].includes(id)?f[k].filter(x=>x!==id):[...f[k],id]});saveFavs(u,user.parseUser);return u;});};
  const handleLogin=u=>{setUser(u);setShowLogin(false);loadFavs(u.parseUser);};
  const handleLogout=async()=>{if(window._parseReady)await Parse.User.logOut();setUser(null);setFavorites({teams:[],players:[]});};
  const favCount=favorites.teams.length+favorites.players.length;

  const UserBar=()=>user
    ?h("div",{style:{display:"flex",alignItems:"center",gap:8}},
        h("div",{style:{width:28,height:28,borderRadius:"50%",background:"#3d7fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff"}},user.name[0].toUpperCase()),
        h("span",{style:{fontSize:13,color:"#c8d4ee",fontWeight:600}},user.name),
        h("button",{onClick:handleLogout,style:{background:"none",border:"1px solid #1a2236",color:"#3e4e70",borderRadius:6,padding:"4px 9px",cursor:"pointer",fontSize:11,fontFamily:"'Barlow',sans-serif"}},"Sign Out")
      )
    :h("button",{onClick:()=>setShowLogin(true),style:{background:"#3d7fff",border:"none",color:"#fff",borderRadius:7,padding:"7px 14px",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"'Barlow',sans-serif"}},"Sign In");

  const NAV=[{id:"scores",icon:"⚡",label:"Scores"},{id:"players",icon:"🏅",label:"Players"},{id:"standings",icon:"📊",label:"Standings"},{id:"favorites",icon:"★",label:"Favorites"}];

  const Header=()=>h("header",{style:{position:"sticky",top:0,zIndex:200,background:"#07090ff2",backdropFilter:"blur(20px)",borderBottom:"1px solid #1a2236"}},
    h("div",{style:{display:"flex",alignItems:"center",gap:12,padding:"10px 20px"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:8,flexShrink:0}},h("span",{style:{fontSize:18}},"🏆"),h("span",{style:{fontSize:16,fontWeight:900,color:"#fff",fontFamily:"'Barlow Condensed',sans-serif"}},"FIELDR")),
      h(SearchBar,{onSelect:p=>{setActivePlayer(p);setPage("players");}}),
      h("div",{style:{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}},h(UserBar))
    ),
    h("nav",{style:{display:"flex",padding:"0 20px",overflowX:"auto",scrollbarWidth:"none"}},
      NAV.map(n=>h("button",{key:n.id,onClick:()=>{setPage(n.id);setActivePlayer(null);},className:"nav-btn "+(page===n.id&&!activePlayer?"active":"")},
        n.icon," ",n.label,
        n.id==="favorites"&&favCount>0?h("span",{style:{background:"#3d7fff",borderRadius:9,padding:"0 5px",fontSize:9,fontWeight:700,color:"#fff",marginLeft:2}},favCount):null
      ))
    )
  );

  if(activePlayer){
    return h("div",{style:{minHeight:"100vh"}},
      h("header",{style:{position:"sticky",top:0,zIndex:200,background:"#07090ff2",backdropFilter:"blur(20px)",borderBottom:"1px solid #1a2236"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:12,padding:"10px 20px"}},
          h("button",{onClick:()=>setActivePlayer(null),style:{display:"flex",alignItems:"center",gap:8,background:"none",border:"none",cursor:"pointer",flexShrink:0}},h("span",{style:{fontSize:18}},"🏆"),h("span",{style:{fontSize:16,fontWeight:900,color:"#fff",fontFamily:"'Barlow Condensed',sans-serif"}},"FIELDR")),
          h(SearchBar,{onSelect:p=>setActivePlayer(p)}),
          h("div",{style:{marginLeft:"auto"}},h(UserBar))
        )
      ),
      h(PlayerProfile,{player:activePlayer,onBack:()=>setActivePlayer(null),favorites,toggleFav}),
      showLogin&&h(LoginModal,{onLogin:handleLogin,onClose:()=>setShowLogin(false)})
    );
  }

  return h("div",{style:{minHeight:"100vh"}},
    h(Header),
    h("main",{style:{maxWidth:1200,margin:"0 auto",padding:20},className:"fade",key:page},
      page==="scores"?h(ScoresPage,{onSelectGame:g=>setActiveGame(g)}):
      page==="players"?h(PlayersPage,{onSelect:p=>setActivePlayer(p),favorites,toggleFav}):
      page==="standings"?h(StandingsPage,{favorites,toggleFav}):
      page==="favorites"&&(!user
        ?h("div",{style:{textAlign:"center",padding:"60px 20px"}},
            h("div",{style:{fontSize:44,marginBottom:12}},"★"),
            h("h2",{style:{fontSize:20,fontWeight:800,color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:8}},"Sign in to save favorites"),
            h("p",{style:{fontSize:13,color:"#3e4e70",marginBottom:22}},"Favorites sync across every device"),
            h("button",{onClick:()=>setShowLogin(true),style:{background:"#3d7fff",border:"none",color:"#fff",borderRadius:9,padding:"11px 26px",cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:"'Barlow',sans-serif"}},"Sign In / Create Account")
          )
        :h("div",null,
            h("h2",{style:{fontSize:18,fontWeight:800,color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:18}},"Your Favorites"),
            favCount===0&&h("div",{style:{textAlign:"center",padding:40,color:"#3e4e70"}},h("div",{style:{fontSize:36,marginBottom:10}},"☆"),h("p",null,"No favorites yet — star teams in Standings and players in Players tab")),
            favorites.players.length>0&&h("div",{style:{marginBottom:20}},
              h("div",{style:{fontSize:10,fontWeight:800,color:"#3e4e70",letterSpacing:1.5,fontFamily:"'Barlow Condensed',sans-serif",marginBottom:8}},"FOLLOWED PLAYERS"),
              h("p",{style:{fontSize:12,color:"#3e4e70"}},favorites.players.length+" player"+(favorites.players.length!==1?"s":"")+" followed · search by name to view their profiles")
            ),
            favorites.teams.length>0&&h("div",null,
              h("div",{style:{fontSize:10,fontWeight:800,color:"#3e4e70",letterSpacing:1.5,fontFamily:"'Barlow Condensed',sans-serif",marginBottom:10}},"FAVORITE TEAMS"),
              h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:10}},
                favorites.teams.map((abv,i)=>h("div",{key:i,style:{background:"#0f1422",border:"1px solid #f0b42933",borderRadius:11,padding:"13px 14px",display:"flex",alignItems:"center",gap:10}},
                  h(Logo,{abv,size:36}),h("span",{style:{fontSize:13,fontWeight:700,color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",flex:1}},abv),
                  h("button",{onClick:()=>toggleFav("team",abv),style:{background:"none",border:"none",color:"#f0b429",cursor:"pointer",fontSize:16}},"★")
                ))
              )
            )
          )
      )
    ),
    activeGame&&h(GameModal,{game:activeGame,onClose:()=>setActiveGame(null)}),
    showLogin&&h(LoginModal,{onLogin:handleLogin,onClose:()=>setShowLogin(false)})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
