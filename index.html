// ─── SEARCH ───────────────────────────────────────────────────────────────────
function Search({onSelect}){
  const [q,setQ]=useState("");
  const [open,setOpen]=useState(false);
  const ref=useRef();
  const hits=useMemo(()=>{
    if(q.length<2) return [];
    const lq=q.toLowerCase();
    return [
      ...PLAYERS.filter(p=>p.name.toLowerCase().includes(lq)||p.team.toLowerCase().includes(lq)).slice(0,5).map(p=>({type:"player",item:p})),
      ...NBA_TEAMS.filter(t=>t.name.toLowerCase().includes(lq)||t.abv.toLowerCase().includes(lq)).slice(0,3).map(t=>({type:"team",item:t})),
    ];
  },[q]);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);
  return (
    <div ref={ref} style={{position:"relative",flex:1,maxWidth:400}}>
      <div style={{display:"flex",alignItems:"center",gap:8,background:C.s2,border:`1px solid ${C.border}`,borderRadius:9,padding:"7px 13px",transition:"border .15s"}}
        onFocus={e=>e.currentTarget.style.borderColor=C.accent} onBlur={e=>e.currentTarget.style.borderColor=C.border}>
        <span style={{fontSize:14,color:C.muted}}>⌕</span>
        <input value={q} onChange={e=>{setQ(e.target.value);setOpen(true);}} placeholder="Players, teams…" style={{background:"none",border:"none",outline:"none",color:C.text,fontSize:13,width:"100%",fontFamily:FONTS.body}}/>
        {q&&<button onClick={()=>{setQ("");setOpen(false);}} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16,padding:0,lineHeight:1}}>×</button>}
      </div>
      {open&&hits.length>0&&(
        <div style={{position:"absolute",top:"calc(100% + 5px)",left:0,right:0,background:C.s2,border:`1px solid ${C.border}`,borderRadius:10,zIndex:999,overflow:"hidden",boxShadow:`0 20px 50px #00000099`}}>
          {hits.map((h,i)=>(
            <div key={i} onClick={()=>{onSelect(h);setQ("");setOpen(false);}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",borderBottom:i<hits.length-1?`1px solid ${C.border}`:"none",transition:"background .1s"}}
              onMouseEnter={e=>e.currentTarget.style.background=C.s3} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <Logo abv={h.type==="player"?h.item.team:h.item.abv} size={28}/>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:C.text}}>{h.type==="player"?h.item.name:h.item.name}</div>
                <div style={{fontSize:11,color:C.muted}}>{h.type==="player"?`${h.item.teamName} · ${h.item.pos}`:`${h.item.conf} · ${h.item.div}`}</div>
              </div>
              <span style={{fontSize:11,color:C.muted}}>{h.type==="player"?`${h.item.pts} PPG`:`${h.item.w}-${h.item.l}`}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function SparkBars({seasons,stat,max}){
  const vals=seasons.map(r=>r[stat]||0);
  const pk=max||Math.max(...vals,1);
  return (
    <div style={{display:"flex",gap:3,alignItems:"flex-end",height:36}}>
      {vals.slice().reverse().map((v,i)=>{
        const h=Math.max(3,(v/pk)*34);
        const isCur=i===0;
        return <div key={i} title={`${seasons[seasons.length-1-i].yr}: ${v.toFixed(1)}`} style={{flex:1,height:h,borderRadius:"2px 2px 0 0",background:isCur?C.accent:C.dim,transition:"background .15s",cursor:"default"}} onMouseEnter={e=>e.currentTarget.style.background=C.accent} onMouseLeave={e=>e.currentTarget.style.background=isCur?C.accent:C.dim}/>;
      })}
    </div>
  );
}

// ─── SEASON TABLES ───────────────────────────────────────────────────────────
function MiniSeasonTable({seasons}){
  const cols=[{k:"yr",l:"Season"},{k:"gp",l:"G"},{k:"pts",l:"PTS"},{k:"reb",l:"REB"},{k:"ast",l:"AST"},{k:"fg",l:"FG%"},{k:"fg3",l:"3P%"}];
  return (
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,whiteSpace:"nowrap"}}>
        <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>
          {cols.map(c=><th key={c.k} style={{padding:"5px 10px",textAlign:c.k==="yr"?"left":"right",color:C.muted,fontSize:10,fontWeight:700,letterSpacing:.8,fontFamily:FONTS.cond}}>{c.l}</th>)}
        </tr></thead>
        <tbody>
          {seasons.map((row,i)=>(
            <tr key={i} style={{borderBottom:`1px solid ${C.border}11`,background:i%2?C.s1+"66":"transparent"}}>
              {cols.map(c=>{
                const v=row[c.k];
                const isPct=c.k==="fg"||c.k==="fg3";
                const color=c.k==="pts"&&v>=28?"#fff":c.k==="pts"&&v>=22?C.text:isPct?v>=50?C.green:v>=40?C.text:C.red:C.text;
                return <td key={c.k} style={{padding:"7px 10px",textAlign:c.k==="yr"?"left":"right",color,fontWeight:c.k==="yr"||c.k==="pts"?600:400,fontFamily:FONTS.cond,fontSize:13}}>
                  {isPct?v+"%":typeof v==="number"?c.k==="gp"?v:v.toFixed(1):v}
                </td>;
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function FullSeasonTable({seasons,tc}){
  const [sortK,setSortK]=useState("yr");
  const [sortD,setSortD]=useState(-1);
  const cols=[
    {k:"yr",l:"Season",al:"left"},{k:"gp",l:"G"},{k:"pts",l:"PTS"},{k:"reb",l:"REB"},
    {k:"ast",l:"AST"},{k:"stl",l:"STL"},{k:"blk",l:"BLK"},{k:"fg",l:"FG%"},
    {k:"fg3",l:"3P%"},{k:"ft",l:"FT%"},{k:"per",l:"PER"},{k:"bpm",l:"BPM"},
  ];
  const sorted=[...seasons].sort((a,b)=>{
    const av=a[sortK],bv=b[sortK];
    return sortD*(typeof av==="string"?(av<bv?-1:1):(av-bv));
  });
  const avg={yr:"Career avg",gp:Math.round(seasons.reduce((s,r)=>s+r.gp,0)/seasons.length)};
  cols.slice(2).forEach(c=>{avg[c.k]=(seasons.reduce((s,r)=>s+(r[c.k]||0),0)/seasons.length);});
  return (
    <div style={{overflowX:"auto",border:`1px solid ${C.border}`,borderRadius:11,overflow:"hidden"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,whiteSpace:"nowrap"}}>
        <thead><tr style={{background:C.s1,borderBottom:`1px solid ${C.border}`}}>
          {cols.map(c=>(
            <th key={c.k} onClick={()=>{setSortK(c.k);setSortD(d=>sortK===c.k?-d:-1);}} style={{padding:"9px 12px",textAlign:c.al||"right",color:sortK===c.k?tc:C.muted,fontWeight:700,fontSize:10,letterSpacing:.8,cursor:"pointer",fontFamily:FONTS.cond,userSelect:"none"}}>
              {c.l}{sortK===c.k?sortD>0?" ↑":" ↓":""}
            </th>
          ))}
        </tr></thead>
        <tbody>
          {sorted.map((row,i)=>(
            <tr key={i} style={{borderBottom:`1px solid ${C.border}22`,background:i%2?C.s1+"77":C.s2}} onMouseEnter={e=>e.currentTarget.style.background="#1a2440"} onMouseLeave={e=>e.currentTarget.style.background=i%2?C.s1+"77":C.s2}>
              {cols.map(c=>{
                const v=row[c.k];
                const isPct=c.k==="fg"||c.k==="fg3"||c.k==="ft";
                const isGold=c.k==="pts"&&v>=30||(c.k==="per"&&v>=28)||(c.k==="bpm"&&v>=8);
                const isWhite=c.k==="pts"&&v>=24||(c.k==="reb"&&v>=10)||(c.k==="ast"&&v>=8);
                const isRed=isPct&&v<38&&c.k==="fg";
                const color=isGold?C.gold:isWhite?"#fff":isPct?(v>=(c.k==="fg"?50:c.k==="fg3"?38:85)?C.green:v>=(c.k==="fg"?44:c.k==="fg3"?33:75)?C.text:C.red):C.text;
                return (
                  <td key={c.k} style={{padding:"8px 12px",textAlign:c.al||"right",color,fontWeight:isGold||isWhite?700:400,fontFamily:FONTS.cond,fontSize:13}}>
                    {c.k==="yr"?<span style={{fontWeight:600}}>{v}</span>
                    :isPct?v.toFixed(1)+"%"
                    :c.k==="gp"?v
                    :typeof v==="number"?v.toFixed(1):v}
                  </td>
                );
              })}
            </tr>
          ))}
          <tr style={{background:"#1c2740",borderTop:`2px solid ${C.border}`}}>
            {cols.map(c=>{
              const v=avg[c.k];
              const isPct=c.k==="fg"||c.k==="fg3"||c.k==="ft";
              return <td key={c.k} style={{padding:"9px 12px",textAlign:c.al||"right",fontWeight:600,color:c.k==="yr"?C.gold:C.text,fontFamily:FONTS.cond,fontSize:13}}>
                {c.k==="yr"?"Career avg":typeof v==="number"?c.k==="gp"?Math.round(v):isPct?v.toFixed(1)+"%":v.toFixed(1):"—"}
              </td>;
            })}
          </tr>
        </tbody>
      </table>
    </div>
  );
}

// ─── LOGIN MODAL ─────────────────────────────────────────────────────────────
function LoginModal({onLogin,onClose}){
  const [mode,setMode]=useState("in");
  const [form,setForm]=useState({email:"",pass:"",name:""});
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const go=async()=>{
    if(!form.email||!form.pass){setErr("Please fill in all fields.");return;}
    setErr(""); setLoading(true);
    try {
      if(mode==="up"){
        const u=new Parse.User();
        u.set("username",form.email);
        u.set("password",form.pass);
        u.set("email",form.email);
        u.set("displayName",form.name||form.email.split("@")[0]);
        await u.signUp();
        onLogin({name:u.get("displayName"),email:form.email,parseUser:u});
      } else {
        const u=await Parse.User.logIn(form.email,form.pass);
        onLogin({name:u.get("displayName")||u.get("username"),email:form.email,parseUser:u});
      }
    } catch(e){
      setErr(e.message||"Something went wrong. Try again.");
    } finally { setLoading(false); }
  };

  return (
    <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:C.s2,border:`1px solid ${C.border}`,borderRadius:14,width:"100%",maxWidth:380,padding:28}}>
        <div style={{textAlign:"center",marginBottom:22}}>
          <div style={{fontSize:30,marginBottom:6}}>🏆</div>
          <h2 style={{fontSize:22,fontWeight:900,color:"#fff",fontFamily:FONTS.cond}}>FIELDR</h2>
          <p style={{fontSize:12,color:C.muted,marginTop:4}}>Save favorites · Follow players · Get alerts</p>
        </div>
        <div style={{display:"flex",background:C.s1,borderRadius:9,padding:4,marginBottom:18}}>
          {[["in","Sign In"],["up","Create Account"]].map(([k,l])=>(
            <button key={k} onClick={()=>{setMode(k);setErr("");}} style={{flex:1,padding:"7px",border:"none",borderRadius:6,background:mode===k?C.s2:"none",color:mode===k?"#fff":C.muted,fontWeight:mode===k?700:400,cursor:"pointer",fontSize:13,fontFamily:FONTS.body,transition:"all .14s"}}>{l}</button>
          ))}
        </div>
        {mode==="up"&&<input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Display Name" style={{width:"100%",background:C.s1,border:`1px solid ${C.border}`,borderRadius:7,padding:"10px 12px",color:C.text,fontSize:13,fontFamily:FONTS.body,outline:"none",marginBottom:8}}/>}
        <input value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="Email" type="email" style={{width:"100%",background:C.s1,border:`1px solid ${C.border}`,borderRadius:7,padding:"10px 12px",color:C.text,fontSize:13,fontFamily:FONTS.body,outline:"none",marginBottom:8}}/>
        <input value={form.pass} onChange={e=>setForm({...form,pass:e.target.value})} placeholder="Password" type="password" onKeyDown={e=>e.key==="Enter"&&go()} style={{width:"100%",background:C.s1,border:`1px solid ${C.border}`,borderRadius:7,padding:"10px 12px",color:C.text,fontSize:13,fontFamily:FONTS.body,outline:"none",marginBottom:err?8:14}}/>
        {err&&<div style={{fontSize:12,color:C.red,marginBottom:10,padding:"6px 10px",background:C.red+"18",borderRadius:6,border:`1px solid ${C.red}33`}}>{err}</div>}
        <button onClick={go} disabled={loading} style={{width:"100%",background:loading?C.muted:C.accent,border:"none",borderRadius:8,padding:"11px",color:"#fff",fontSize:14,fontWeight:700,cursor:loading?"not-allowed":"pointer",fontFamily:FONTS.body,transition:"background .15s"}}>
          {loading?"…":mode==="in"?"Sign In →":"Create Account →"}
        </button>
      </div>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App(){
  const [page,setPage]=useState("scores");
  const [user,setUser]=useState(null);
  const [showLogin,setShowLogin]=useState(false);
  const [activeBox,setActiveBox]=useState(null);
  const [activePlayer,setActivePlayer]=useState(null);
  const [favorites,setFavorites]=useState({teams:[],players:[]});
  const [favLoading,setFavLoading]=useState(false);

  // ── Restore session on load ──────────────────────────────────────────────
  useEffect(()=>{
    const current=Parse.User.current();
    if(current){
      setUser({name:current.get("displayName")||current.get("username"),email:current.get("email"),parseUser:current});
      loadFavorites(current);
    }
  },[]);

  // ── Load favorites from Back4App ─────────────────────────────────────────
  const loadFavorites=async(parseUser)=>{
    try {
      const q=new Parse.Query("Favorites");
      q.equalTo("user",parseUser);
      const obj=await q.first();
      if(obj){
        setFavorites({
          teams:obj.get("teams")||[],
          players:obj.get("players")||[],
        });
      }
    } catch(e){ console.warn("loadFavorites:",e); }
  };

  // ── Save favorites to Back4App ────────────────────────────────────────────
  const saveFavorites=async(newFavs,parseUser)=>{
    try {
      const q=new Parse.Query("Favorites");
      q.equalTo("user",parseUser);
      let obj=await q.first();
      if(!obj){
        obj=new Parse.Object("Favorites");
        obj.set("user",parseUser);
        // Set ACL so only this user can read/write their own favorites
        const acl=new Parse.ACL(parseUser);
        acl.setPublicReadAccess(false);
        obj.setACL(acl);
      }
      obj.set("teams",newFavs.teams);
      obj.set("players",newFavs.players);
      await obj.save();
    } catch(e){ console.warn("saveFavorites:",e); }
  };

  // ── Toggle favorite ───────────────────────────────────────────────────────
  const toggleFav=(type,id)=>{
    if(!user){setShowLogin(true);return;}
    setFavorites(f=>{
      const key=type+"s";
      const updated={...f,[key]:f[key].includes(id)?f[key].filter(x=>x!==id):[...f[key],id]};
      saveFavorites(updated,user.parseUser);
      return updated;
    });
  };

  // ── Login handler ─────────────────────────────────────────────────────────
  const handleLogin=(u)=>{
    setUser(u);
    setShowLogin(false);
    loadFavorites(u.parseUser);
  };

  // ── Logout ────────────────────────────────────────────────────────────────
  const handleLogout=async()=>{
    await Parse.User.logOut();
    setUser(null);
    setFavorites({teams:[],players:[]});
  };

  const handleSearch=r=>{
    if(r.type==="player"){setActivePlayer(r.item);setPage("players");}
    else setPage("standings");
  };

  const NAV=[
    {id:"scores",label:"Scores",icon:"⚡"},
    {id:"players",label:"Players",icon:"🏅"},
    {id:"standings",label:"Standings",icon:"📊"},
    {id:"favorites",label:"Favorites",icon:"★"},
  ];

  const favCount=favorites.teams.length+favorites.players.length;

  // If a player is selected, show their full profile
  if(activePlayer&&page==="players"){
    return (
      <div style={{minHeight:"100vh",background:C.bg,fontFamily:FONTS.body}}>
        <div style={{background:`${C.bg}f0`,backdropFilter:"blur(20px)",borderBottom:`1px solid ${C.border}`,padding:"10px 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:200}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18}}>🏆</span><span style={{fontSize:16,fontWeight:900,color:"#fff",fontFamily:FONTS.cond,letterSpacing:".5px"}}>FIELDR</span></div>
          <Search onSelect={handleSearch}/>
          <div style={{marginLeft:"auto"}}>
            {user?<div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:30,height:30,borderRadius:"50%",background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#fff"}}>{user.name[0].toUpperCase()}</div><span style={{fontSize:13,color:C.text,fontWeight:600}}>{user.name}</span><button onClick={handleLogout} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:6,padding:"4px 9px",cursor:"pointer",fontSize:11,fontFamily:FONTS.body}}>Out</button></div>
            :<button onClick={()=>setShowLogin(true)} style={{background:C.accent,border:"none",color:"#fff",borderRadius:7,padding:"7px 15px",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:FONTS.body}}>Sign In</button>}
          </div>
        </div>
        <PlayerProfile player={activePlayer} onBack={()=>setActivePlayer(null)} favorites={favorites} toggleFav={toggleFav}/>
        {showLogin&&<LoginModal onLogin={handleLogin} onClose={()=>setShowLogin(false)}/>}
      </div>
    );
  }

  return (
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:FONTS.body}}>
      {/* Header */}
      <header style={{position:"sticky",top:0,zIndex:200,background:`${C.bg}f0`,backdropFilter:"blur(20px)",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}><span style={{fontSize:20}}>🏆</span><span style={{fontSize:17,fontWeight:900,color:"#fff",fontFamily:FONTS.cond,letterSpacing:".5px"}}>FIELDR</span></div>
          <Search onSelect={handleSearch}/>
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
            {user
              ?<div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:30,height:30,borderRadius:"50%",background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#fff"}}>{user.name[0].toUpperCase()}</div>
                  <span style={{fontSize:13,color:C.text,fontWeight:600}}>{user.name}</span>
                  <button onClick={handleLogout} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,borderRadius:6,padding:"4px 9px",cursor:"pointer",fontSize:11,fontFamily:FONTS.body}}>Sign Out</button>
                </div>
              :<button onClick={()=>setShowLogin(true)} style={{background:C.accent,border:"none",color:"#fff",borderRadius:7,padding:"7px 15px",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:FONTS.body}}>Sign In</button>
            }
          </div>
        </div>
        <Ticker games={TODAY_GAMES} onGameClick={g=>setActiveBox(g)}/>
        <nav style={{display:"flex",padding:"0 20px",background:C.bg,overflowX:"auto",scrollbarWidth:"none"}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>{setPage(n.id);setActivePlayer(null);}} style={{display:"flex",alignItems:"center",gap:5,padding:"10px 14px",border:"none",background:"none",color:page===n.id?"#fff":C.muted,fontSize:13,fontWeight:page===n.id?700:400,cursor:"pointer",borderBottom:page===n.id?`2px solid ${C.accent}`:"2px solid transparent",transition:"all .14s",fontFamily:FONTS.body,whiteSpace:"nowrap"}}>
              {n.icon} {n.label}
              {n.id==="favorites"&&favCount>0&&<span style={{background:C.accent,borderRadius:9,padding:"0 5px",fontSize:9,fontWeight:700,color:"#fff",marginLeft:2}}>{favCount}</span>}
            </button>
          ))}
        </nav>
      </header>

      <main style={{maxWidth:1200,margin:"0 auto",padding:"20px"}} className="fade" key={page}>
        {page==="scores"&&(
          <div>
            <div style={{fontSize:10,fontWeight:800,color:C.muted,letterSpacing:1.5,fontFamily:FONTS.cond,marginBottom:14}}>WED · MARCH 11, 2026 · NBA</div>
            <ScoresPage games={TODAY_GAMES} onGameClick={g=>setActiveBox(g)}/>
          </div>
        )}
        {page==="players"&&<PlayersPage onSelect={p=>{setActivePlayer(p);}} favorites={favorites} toggleFav={toggleFav}/>}
        {page==="standings"&&<StandingsPage favorites={favorites} toggleFav={toggleFav}/>}
        {page==="favorites"&&(
          <div>
            {!user?(
              <div style={{textAlign:"center",padding:"60px 20px"}}>
                <div style={{fontSize:44,marginBottom:12}}>★</div>
                <h2 style={{fontSize:20,fontWeight:800,color:"#fff",fontFamily:FONTS.cond,marginBottom:8}}>Sign in to save favorites</h2>
                <p style={{fontSize:13,color:C.muted,marginBottom:22}}>Follow teams and players for personalized updates</p>
                <button onClick={()=>setShowLogin(true)} style={{background:C.accent,border:"none",color:"#fff",borderRadius:9,padding:"11px 26px",cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:FONTS.body}}>Sign In / Create Account</button>
              </div>
            ):(
              <div>
                <h2 style={{fontSize:18,fontWeight:800,color:"#fff",fontFamily:FONTS.cond,marginBottom:18}}>Your Favorites</h2>
                {favorites.teams.length>0&&(
                  <div style={{marginBottom:22}}>
                    <div style={{fontSize:10,fontWeight:800,color:C.muted,letterSpacing:1.5,fontFamily:FONTS.cond,marginBottom:10}}>TEAMS</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
                      {NBA_TEAMS.filter(t=>favorites.teams.includes(t.abv)).map((t,i)=>(
                        <div key={i} style={{background:C.s2,border:"1px solid #f0b42933",borderRadius:11,padding:"13px 14px",display:"flex",alignItems:"center",gap:10}}>
                          <Logo abv={t.abv} size={38}/><div><div style={{fontSize:13,fontWeight:700,color:"#fff",fontFamily:FONTS.cond}}>{t.name}</div><div style={{fontSize:12,fontWeight:700,color:C.text,marginTop:3,fontFamily:FONTS.cond}}>{t.w}-{t.l} · {t.pct}</div></div>
                          <button onClick={()=>toggleFav("team",t.abv)} style={{marginLeft:"auto",background:"none",border:"none",color:C.gold,cursor:"pointer",fontSize:16}}>★</button>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {favorites.players.length>0&&(
                  <div>
                    <div style={{fontSize:10,fontWeight:800,color:C.muted,letterSpacing:1.5,fontFamily:FONTS.cond,marginBottom:10}}>PLAYERS</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10}}>
                      {PLAYERS.filter(p=>favorites.players.includes(p.id)).map((p,i)=>(
                        <div key={i} style={{background:C.s2,border:"1px solid #f0b42933",borderRadius:11,padding:"13px 14px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>{setActivePlayer(p);setPage("players");}}>
                          <div style={{width:42,height:42,borderRadius:11,background:TC[p.team]||"#333",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:"#fff",fontFamily:FONTS.cond}}>{p.name.split(" ").map(n=>n[0]).join("").slice(0,2)}</div>
                          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:"#fff",fontFamily:FONTS.cond}}>{p.name}</div><div style={{fontSize:11,color:C.muted}}>{p.teamName}</div><div style={{fontSize:12,fontWeight:600,color:C.text,marginTop:3,fontFamily:FONTS.cond}}>{p.pts} PTS · {p.reb} REB · {p.ast} AST</div></div>
                          <button onClick={e=>{e.stopPropagation();toggleFav("player",p.id);}} style={{background:"none",border:"none",color:C.gold,cursor:"pointer",fontSize:16}}>★</button>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {favCount===0&&<div style={{textAlign:"center",padding:40,color:C.muted}}><div style={{fontSize:36,marginBottom:10}}>☆</div><p>No favorites yet — star teams and players to follow them</p></div>}
              </div>
            )}
          </div>
        )}
      </main>

      {activeBox&&<BoxModal game={activeBox} onClose={()=>setActiveBox(null)}/>}
      {showLogin&&<LoginModal onLogin={handleLogin} onClose={()=>setShowLogin(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
